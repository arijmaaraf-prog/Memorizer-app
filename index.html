  const suspendedLeeches = cards.filter(fcLeechIsSuspended).length;
  const watchLeeches = cards.filter((c) => fcLeechIsWatchMode(c) && !fcLeechIsSuspended(c)).length;
  const groupCount = Object.keys(data.meta.memory_groups || {}).length;
  const avgConsolidation = cards.length ? Math.round((cards.reduce((acc, c) => acc + (c.consolidation_score || 0), 0) / cards.length) * 100) : 0;
  const avgHorizon = cards.length ? Math.round(cards.reduce((acc, c) => acc + (c.retention_horizon_days || 0), 0) / cards.length) : 0;
  const reviewsLeft = Math.max(0, fcSettings.daily_review_limit - data.meta.reviews_done);
  const health = fcDataHealth(data);
  const scheduler = "FSRS-17w (" + Math.round((fcSettings.target_retention || 0.9) * 100) + "%)";
  const behavior = fcBehaviorSummary(data);
  const dueColor = dueCount > 0 ? "#fca5a5" : "#f3f4f6";
  document.getElementById("fcStatsBar").innerHTML = [
    `<div class="fc-stat"><div class="fc-stat-label">Cards</div><div class="fc-stat-value">${cards.length}</div></div>`,
    `<div class="fc-stat"><div class="fc-stat-label">Due now</div><div class="fc-stat-value" style="color:${dueColor}">${dueCount}</div></div>`,
    `<div class="fc-stat"><div class="fc-stat-label">Workload</div><div class="fc-stat-value">${reviewsLeft} left · queue≤${fcSettings.max_session_queue}</div></div>`,
    `<div class="fc-stat"><div class="fc-stat-label">Long-term</div><div class="fc-stat-value">groups ${groupCount} · at-risk ${atRiskCount}</div></div>`,
    `<div class="fc-stat"><div class="fc-stat-label">Consolidation</div><div class="fc-stat-value">${avgConsolidation}% · horizon ~${avgHorizon}d</div></div>`,
    `<div class="fc-stat"><div class="fc-stat-label">${fcEscapeHtml(health.label)}</div><div class="fc-stat-value">${fcEscapeHtml(health.value)} · ${fcEscapeHtml(scheduler)}</div></div>`,
    `<div class="fc-stat"><div class="fc-stat-label">Behavior (7d)</div><div class="fc-stat-value">Again ${Math.round(behavior.again_rate * 100)}% · edits ${behavior.manual_grade_changes} · postpone ${behavior.postpones}</div></div>`,
    `<div class="fc-stat"><div class="fc-stat-label">Leeches</div><div class="fc-stat-value">${suspendedLeeches} suspended · ${watchLeeches} watch</div></div>`
  ].join("");
}

function fcDataHealth(data) {
  const cards = Object.values(data.cards || {});
  if (cards.length === 0) return { label: "Data health", value: "Empty" };
  let issues = 0;
  for (const c of cards) {
    const due = new Date(c.next_due).getTime();
    const last = new Date(c.last_review).getTime();
    if (!Number.isFinite(due) || !Number.isFinite(last)) issues += 1;
    if (!Number.isFinite(c.interval_days) || c.interval_days <= 0) issues += 1;
    if (!Number.isFinite(c.difficulty) || c.difficulty < 1 || c.difficulty > 10) issues += 1;
  }
  if (issues === 0) return { label: "Data health", value: "Good" };
  return { label: "Data issues", value: String(issues) };
}

function fcAppendReviewLog(data, entry) {
  fcEnsureMeta(data);
  data.meta.review_logs.push(entry);
  if (data.meta.review_logs.length > FC_REVIEW_LOG_LIMIT) {
    data.meta.review_logs = data.meta.review_logs.slice(data.meta.review_logs.length - FC_REVIEW_LOG_LIMIT);
  }
}

function fcBuildCalibrationDataset() {
  const data = fcLoadData();
  fcEnsureMeta(data);
  return {
    exported_at: new Date().toISOString(),
    settings: fcSettings,
    review_logs: data.meta.review_logs || []
  };
}

// --- Replay engine ---
// Replays review logs per-card from scratch using candidate weights w.
// Stability is recomputed dynamically — stored stability is NOT used as truth.
// Prefers actual_elapsed_days (new telemetry); falls back to prev_interval_days for old logs.
function fcReplayLogsWithWeights(logs, w) {
  if (!Array.isArray(logs) || logs.length === 0) return null;
  if (!Array.isArray(w) || w.length !== 17 || !w.every(function(v) { return Number.isFinite(v); })) {
    w = FC_FSRS_DEFAULT_W.slice();
  }

  // Group reviews by card and sort chronologically.
  const byCard = Object.create(null);
  for (const entry of logs) {
    if (!entry || typeof entry.card !== "string") continue;
    if (!byCard[entry.card]) byCard[entry.card] = [];
    byCard[entry.card].push(entry);
  }

  let totalBrier = 0, totalLogloss = 0, successCount = 0, pSum = 0, n = 0;

  for (const cardReviews of Object.values(byCard)) {
    cardReviews.sort(function(a, b) { return new Date(a.ts).getTime() - new Date(b.ts).getTime(); });

    let sDay = null; // replayed stability in days
    let diff = 5;    // replayed difficulty
    let reps = 0;    // replayed reps

    for (const entry of cardReviews) {
      const rawGrade = Number(entry.grade);
      if (!Number.isFinite(rawGrade)) continue;
      const fsrsGrade = Math.max(1, Math.min(4, rawGrade + 1)); // 0..3 -> 1..4
      const entryWasNew = Boolean(entry.was_new);

      // Bootstrap state on first log entry seen for this card.
      if (sDay === null) {
        if (entryWasNew) {
          // True first new-card review: initialise from w, skip scoring (no prior state to predict).
          if (fsrsGrade === 1) {
            sDay = Math.max(0.02, fcFsrsInitialStability(0, w) * 0.6);
            diff = Math.max(1, Math.min(10, fcFsrsInitialDifficulty(1, w)));
            reps = 0;
          } else {
            sDay = Math.max(0.02, fcFsrsInitialStability(fsrsGrade - 1, w));
            diff = Math.max(1, Math.min(10, fcFsrsInitialDifficulty(fsrsGrade, w)));
            reps = 1;
          }
          sDay = Math.min(sDay, 10000);
          continue;
        } else {
          // Card predates the log window: seed from logged prior state and proceed to score.
          const bs = Number(entry.prev_stability_days);
          sDay = Number.isFinite(bs) && bs > 0 ? Math.max(0.01, Math.min(10000, bs)) : 1;
          diff = Math.max(1, Math.min(10, Number.isFinite(Number(entry.difficulty)) ? Number(entry.difficulty) : 5));
          reps = 1;
        }
      }

      // Prefer actual_elapsed_days (new telemetry); fall back to prev_interval_days for old logs.
      const actualE = Number(entry.actual_elapsed_days);
      const prevI = Number(entry.prev_interval_days);
      const elapsed = Number.isFinite(actualE) && actualE >= 0
        ? actualE
        : (Number.isFinite(prevI) && prevI > 0 ? prevI : null);

      // Score: predict recall probability using replayed stability and actual elapsed time.
      let p = null;
      if (elapsed !== null) {
        p = Math.max(0.001, Math.min(0.999, Math.pow(1 + elapsed / (9 * sDay), -1)));
        const y = rawGrade > 0 ? 1 : 0;
        totalBrier += (p - y) * (p - y);
        totalLogloss += -(y * Math.log(p) + (1 - y) * Math.log(1 - p));
        successCount += y;
        pSum += p;
        n++;
      }

      // Advance replayed state using candidate weights.
      const retriev = p !== null ? p : 0.9;
      if (entryWasNew) {
        if (fsrsGrade === 1) {
          sDay = Math.max(0.02, fcFsrsInitialStability(0, w) * 0.6);
          diff = Math.max(1, Math.min(10, fcFsrsInitialDifficulty(1, w)));
          reps = 0;
        } else {
          sDay = Math.max(0.02, fcFsrsInitialStability(fsrsGrade - 1, w));
          diff = Math.max(1, Math.min(10, fcFsrsInitialDifficulty(fsrsGrade, w)));
          reps = 1;
        }
        sDay = Math.min(sDay, 10000);
      } else if (fsrsGrade === 1) {
        sDay = Math.max(0.02, Math.min(10000, fcFsrsNextForgetStability(sDay, diff, retriev, w)));
        diff = Math.max(1, Math.min(10, fcFsrsNextDifficulty(diff, fsrsGrade, w)));
        reps = 0;
      } else {
        sDay = Math.max(0.02, Math.min(10000, fcFsrsNextRecallStability(sDay, diff, retriev, fsrsGrade, w)));
        diff = Math.max(1, Math.min(10, fcFsrsNextDifficulty(diff, fsrsGrade, w)));
        reps++;
      }
    }
  }

  if (n === 0) return null;
  return {
    n,
    brier: Math.round((totalBrier / n) * 1000000) / 1000000,
    logloss: Math.round((totalLogloss / n) * 1000000) / 1000000,
    success_rate: Math.round((successCount / n) * 10000) / 10000,
    mean_signed_error: Math.round(((successCount / n) - (pSum / n)) * 10000) / 10000
  };
}

function fcCalibrationMetricsFromLogs(logs) {
  if (!Array.isArray(logs) || logs.length === 0) return null;
  let n = 0;
  let brier = 0;
  let logloss = 0;
  let success = 0;
  let pSum = 0;
  for (const row of logs) {
    const pRaw = Number(row && row.retrievability);
    const y = Number(row && row.grade) > 0 ? 1 : 0;
    if (!Number.isFinite(pRaw)) continue;
    const p = Math.max(0.001, Math.min(0.999, pRaw));
    n += 1;
    success += y;
    pSum += p;
    brier += (p - y) * (p - y);
    logloss += -(y * Math.log(p) + (1 - y) * Math.log(1 - p));
  }
  if (n === 0) return null;
  return {
    n: n,
    success_rate: success / n,
    brier: brier / n,
    logloss: logloss / n,
    mean_signed_error: (success / n) - (pSum / n)
  };
}

function fcClampWeight(value) {
  if (!Number.isFinite(value)) return 0;
  return Math.max(-8, Math.min(8, value));
}

// --- Calibration optimizer ---
// Coordinate descent over w[8..16] (interval dynamics weights).
// Tries ±DELTA on each index, accepts only improvements — cannot degrade Brier score.
// Deterministic: no randomness; same logs + same starting weights → same result.
function fcCoordinateDescentOptimizer(dataset) {
  const logs = Array.isArray(dataset && dataset.review_logs) ? dataset.review_logs : [];
  const baseW = (dataset && dataset.settings && Array.isArray(dataset.settings.fsrs_w) && dataset.settings.fsrs_w.length === 17)
    ? dataset.settings.fsrs_w.slice()
    : FC_FSRS_DEFAULT_W.slice();
  if (logs.length < 50) return { fsrs_w: baseW };

  // Cap sample size to keep per-optimise runtime bounded (3 passes × 9 indices × 2 signs = 54 replay runs at most).
  const sampleLogs = logs.length > 2000 ? logs.slice(logs.length - 2000) : logs;

  const initial = fcReplayLogsWithWeights(sampleLogs, baseW);
  if (!initial) return { fsrs_w: baseW };

  // w[8..16] govern recall-growth and lapse stability; w[0..7] are data-sparse initial params.
  const OPTIMIZE_IDX = [8, 9, 10, 11, 12, 13, 14, 15, 16];
  const DELTA = 0.05;
  const PASSES = 3;

  let bestW = baseW.slice();
  let bestBrier = initial.brier;

  for (let pass = 0; pass < PASSES; pass++) {
    for (const idx of OPTIMIZE_IDX) {
      for (const sign of [1, -1]) {
        const candidate = bestW.slice();
        candidate[idx] = fcClampWeight(candidate[idx] + sign * DELTA);
        const result = fcReplayLogsWithWeights(sampleLogs, candidate);
        if (result && Number.isFinite(result.brier) && result.brier < bestBrier) {
          bestW = candidate;
          bestBrier = result.brier;
        }
      }
    }
  }

  return { fsrs_w: bestW };
}

function fcEvaluateCalibration() {
  const el = document.getElementById("fcCalibrationInfo");
  if (!el) return;
  const dataset = fcBuildCalibrationDataset();
  const logs = dataset.review_logs || [];
  const blendedLogs = fcBuildCalibrationBlend(logs);
  // Stored-retrievability metrics (quick live view)
  const stored = fcCalibrationMetricsFromLogs(logs);
  // Replay metrics using current weights (true per-card trajectory scoring)
  const replay = fcReplayLogsWithWeights(logs, fcSettings.fsrs_w);
  const replayBlended = fcReplayLogsWithWeights(blendedLogs, fcSettings.fsrs_w);
  const data = fcLoadData();
  fcEnsureMeta(data);
  const history = data.meta.calibration_history || [];
  let html = "";
  if (!replay && !stored) {
    html = "Calibration: not enough review logs yet.";
  } else {
    const m = replay || stored;
    const sourceLabel = replay ? "replay" : "stored-R";
    html =
      "<strong>Current (" + sourceLabel + ", n=" + m.n + "):</strong> " +
      "Brier=" + m.brier.toFixed(4) +
      " · LogLoss=" + m.logloss.toFixed(4) +
      " · MSE=" + m.mean_signed_error.toFixed(4) +
      " · success=" + Math.round(m.success_rate * 100) + "%" +
      " (Brier lower=better; MSE>0=underconfident, MSE&lt;0=overconfident)";
    if (replayBlended) {
      html += "<br><strong>Blend (recent + long-range, n=" + replayBlended.n + "):</strong> Brier=" + replayBlended.brier.toFixed(4) + " · LogLoss=" + replayBlended.logloss.toFixed(4) + " · MSE=" + replayBlended.mean_signed_error.toFixed(4);
    }
    if (history.length > 0) {
      html += "<br><br><strong>Calibration run history (" + history.length + " runs):</strong><br>";
      const rows = history.slice().reverse().slice(0, 10);
      html += rows.map(function(row) {
        const ts = row.ts ? new Date(row.ts).toLocaleString() : row.day_key;
        const delta = Number.isFinite(row.brier_delta)
          ? (row.brier_delta <= 0 ? " ✓ &Delta;=" + row.brier_delta.toFixed(5) : " ✗ &Delta;=+" + row.brier_delta.toFixed(5))
          : "";
        const before = Number.isFinite(row.brier_before) ? row.brier_before.toFixed(4) : "—";
        const after = Number.isFinite(row.brier_after) ? row.brier_after.toFixed(4) : "—";
        const mse = Number.isFinite(row.mse_before) ? row.mse_before.toFixed(3) : "—";
        return ts + " · n=" + row.samples + " · Brier " + before + "→" + after + delta + " · MSEbefore=" + mse + " · " + row.optimizer;
      }).join("<br>");
      if (history.length > 10) html += "<br>…(" + (history.length - 10) + " older runs hidden)";
    }
  }
  el.innerHTML = html;
}

function fcReviewLogsWithinDays(logs, days) {
  const windowMs = Math.max(1, days) * 24 * 60 * 60 * 1000;
  const cutoff = Date.now() - windowMs;
  return (logs || []).filter((row) => {
    const ts = new Date(row && row.ts).getTime();
    return Number.isFinite(ts) && ts >= cutoff;
  });
}

function fcBehaviorSummary(data) {
  fcEnsureMeta(data);
  const logs = data.meta.review_logs || [];
  const recentLogs = fcReviewLogsWithinDays(logs, 7);
  const graded = recentLogs.filter((r) => Number.isFinite(Number(r && r.grade)));
  const againCount = graded.filter((r) => Number(r.grade) === 0).length;
  const avgAgain = graded.length ? againCount / graded.length : 0;
  const behavior = data.meta.behavior || {};
  return {
    recent_reviews: graded.length,
    again_rate: avgAgain,
    manual_grade_changes: Number(behavior.manual_grade_changes) || 0,
    postpones: Number(behavior.postpones) || 0
  };
}

function fcDeterministicEvenSample(logs, limit) {
  const arr = Array.isArray(logs) ? logs : [];
  if (arr.length <= limit) return arr.slice();
  if (limit <= 0) return [];
  if (limit === 1) return [arr[0]];
  const step = (arr.length - 1) / (limit - 1);
  const sampled = [];
  for (let i = 0; i < limit; i++) {
    sampled.push(arr[Math.round(i * step)]);
  }
  return sampled;
}

function fcReviewLogKey(row) {
  return String(row && row.ts) + "::" + String(row && row.card);
}

function fcBuildCalibrationBlend(logs) {
  const all = Array.isArray(logs) ? logs.slice() : [];
  all.sort((a, b) => new Date(a.ts).getTime() - new Date(b.ts).getTime());
  const recent = fcReviewLogsWithinDays(all, fcSettings.auto_calibration_window_days);
  const longRange = fcReviewLogsWithinDays(all, fcSettings.auto_calibration_long_range_days);
  const recentIds = new Set(recent.map(fcReviewLogKey));
  const oldLong = longRange.filter((row) => !recentIds.has(fcReviewLogKey(row)));
  const minLong = Number(fcSettings.auto_calibration_long_range_min_reviews) || 0;
  const targetOldSample = Math.max(minLong, recent.length);
  const boundedOldSample = Math.min(oldLong.length, targetOldSample);
  const sampledOld = fcDeterministicEvenSample(oldLong, boundedOldSample);
  const merged = recent.concat(sampledOld);
  merged.sort((a, b) => new Date(a.ts).getTime() - new Date(b.ts).getTime());
  return merged;
}

function fcAutoCalibrateMaybe(data) {
  fcEnsureMeta(data);
  if (!fcSettings.auto_calibration_enabled) return false;
  const allLogs = data.meta.review_logs || [];
  const scopedLogs = fcBuildCalibrationBlend(allLogs);
  if (scopedLogs.length < fcSettings.auto_calibration_min_reviews) return false;
  const key = fcTodayKey();
  const alreadyRan = (data.meta.calibration_history || []).some((row) => row && row.day_key === key);
  if (alreadyRan) return false;
  try {
    const hook = window && window.FC_CALIBRATION_HOOK;
    const optimizerOutput = (typeof hook === "function")
      ? hook({
        exported_at: new Date().toISOString(),
        settings: fcSettings,
        review_logs: scopedLogs
      })
      : fcCoordinateDescentOptimizer({
      exported_at: new Date().toISOString(),
      settings: fcSettings,
      review_logs: scopedLogs
    });
    if (!optimizerOutput || !fcValidWeightsArray(optimizerOutput.fsrs_w)) return false;
    // True before-score: replay trajectories with current (old) weights before overwriting them.
    const replayBefore = fcReplayLogsWithWeights(scopedLogs, fcSettings.fsrs_w);
    const normalized = fcNormalizeSettings({ ...fcSettings, fsrs_w: optimizerOutput.fsrs_w });
    fcSettings = normalized;
    try {
      localStorage.setItem(FC_SETTINGS_KEY, JSON.stringify(normalized));
    } catch (e) {
      return false;
    }
    // True after-score: replay trajectories with new weights on the same logs.
    const replayAfter = fcReplayLogsWithWeights(scopedLogs, normalized.fsrs_w);
    data.meta.calibration_history.push({
      ts: new Date().toISOString(),
      day_key: key,
      samples: scopedLogs.length,
      brier_before: replayBefore ? replayBefore.brier : null,
      brier_after: replayAfter ? replayAfter.brier : null,
      logloss_before: replayBefore ? replayBefore.logloss : null,
      logloss_after: replayAfter ? replayAfter.logloss : null,
      mse_before: replayBefore ? replayBefore.mean_signed_error : null,
      mse_after: replayAfter ? replayAfter.mean_signed_error : null,
      success_rate: replayBefore ? replayBefore.success_rate : null,
      optimizer: (typeof hook === "function") ? "external_hook" : "builtin_coord_descent",
      brier_delta: (replayBefore && replayAfter) ? Math.round((replayAfter.brier - replayBefore.brier) * 1000000) / 1000000 : null
    });
    if (data.meta.calibration_history.length > 100) {
      data.meta.calibration_history = data.meta.calibration_history.slice(data.meta.calibration_history.length - 100);
    }
    fcApplySettingsToForm();
    return true;
  } catch (e) {
    return false;
  }
}

function fcLeechIsSuspended(card) {
  const until = new Date(card.leech_suspended_until || "").getTime();
  return Number.isFinite(until) && until > Date.now();
}

function fcLeechIsWatchMode(card) {
  const until = new Date(card.leech_watch_until || "").getTime();
  return Number.isFinite(until) && until > Date.now();
}

function fcUpdateStruggleSignals(card, rating) {
  const alpha = 0.2;
  const isHard = rating === 1 ? 1 : 0;
  const isStruggle = rating <= 1 ? 1 : 0;
  card.struggle_score = (1 - alpha) * (card.struggle_score || 0) + alpha * isStruggle;
  card.hard_score = (1 - alpha) * (card.hard_score || 0) + alpha * isHard;
  card.struggle_reviews = (card.struggle_reviews || 0) + 1;
}

function fcApplyLeechPolicy(card, rating) {
  // Path A: repeated lapse failures => hard suspension.
  if (rating === 0 && (card.lapses || 0) >= fcSettings.leech_lapse_threshold) {
    const suspendMs = fcSettings.leech_suspend_days * 24 * 60 * 60 * 1000;
    card.leech_suspended_until = new Date(Date.now() + suspendMs).toISOString();
    return { type: "lapse_suspend" };
  }

  // Path B: mixed struggle profile (many Hard + Again) => watch-mode cooldown.
  const enoughHistory = (card.struggle_reviews || 0) >= fcSettings.mixed_struggle_min_reviews;
  const mixedStruggle = enoughHistory && (card.struggle_score || 0) >= 0.55 && (card.hard_score || 0) >= 0.30;
  if (mixedStruggle) {
    const cooldownMs = fcSettings.mixed_struggle_cooldown_days * 24 * 60 * 60 * 1000;
    card.leech_watch_until = new Date(Date.now() + cooldownMs).toISOString();
    const watchDue = Date.now() + 24 * 60 * 60 * 1000; // distinct action: short follow-up review
    card.next_due = new Date(Math.min(new Date(card.next_due).getTime(), watchDue)).toISOString();
    return { type: "mixed_watch" };
  }
  return { type: "none" };
}

function fcExportCalibrationData() {
  const payload = fcBuildCalibrationDataset();
  const stamp = fcTodayKey().replace(/-/g, "");
  fcDownloadText("memory_engine_review_logs_" + stamp + ".json", JSON.stringify(payload, null, 2));
  fcUpdateSessionUi("Review logs exported");
}

function fcRunCalibrationHook() {
  try {
    const hook = window && window.FC_CALIBRATION_HOOK;
    const fullDataset = fcBuildCalibrationDataset();
    const blendedDataset = {
      exported_at: fullDataset.exported_at,
      settings: fullDataset.settings,
      review_logs: fcBuildCalibrationBlend(fullDataset.review_logs || [])
    };
    const output = (typeof hook === "function")
      ? hook(blendedDataset)
      : fcCoordinateDescentOptimizer(blendedDataset);
    if (!output || !fcValidWeightsArray(output.fsrs_w)) {
      fcUpdateSessionUi("Calibration hook returned invalid weights");
      return;
    }
    const normalized = fcNormalizeSettings({ ...fcSettings, fsrs_w: output.fsrs_w });
    fcSettings = normalized;
    try {
      localStorage.setItem(FC_SETTINGS_KEY, JSON.stringify(normalized));
    } catch (e) {
      fcUpdateSessionUi("Calibration produced weights, but saving settings failed.");
      return;
    }
    fcApplySettingsToForm();
    fcUpdateSessionUi((typeof hook === "function") ? "Calibration hook applied new weights" : "Built-in optimizer applied new weights");
    fcRender();
  } catch (e) {
    fcUpdateSessionUi("Calibration hook failed");
  }
}

function fcNoQueueMessage(data) {
  fcEnsureMeta(data);
  const reviewsLeft = Math.max(0, fcSettings.daily_review_limit - data.meta.reviews_done);
  const newLeft = Math.max(0, fcSettings.daily_new_limit - data.meta.new_done);
  const dueCount = Object.values(data.cards).filter(fcIsDue).length;
  const watchCount = Object.values(data.cards).filter((c) => fcIsDue(c) && fcLeechIsWatchMode(c) && !fcLeechIsSuspended(c)).length;
  if (reviewsLeft <= 0) return "Daily review limit reached";
  if (dueCount > 0 && newLeft <= 0) return "Daily new-card limit reached";
  if (watchCount > 0) return "Watch-mode cards queued by priority/cap policy";
  return "No cards due right now";
}

function fcDueQueue(data) {
  fcEnsureMeta(data);
  const reviewBudget = Math.min(
    Math.max(0, fcSettings.daily_review_limit - data.meta.reviews_done),
    Math.max(1, fcSettings.max_session_queue)
  );
  const newLeft = Math.max(0, fcSettings.daily_new_limit - data.meta.new_done);
  if (reviewBudget <= 0) return [];
  const due = Object.entries(data.cards)
    .filter(([, card]) => fcIsDue(card) && !fcLeechIsSuspended(card))
    .sort((a, b) => {
      const aRisk = (a[1].memory_state === "reactivation" || a[1].at_risk) ? 1 : 0;
      const bRisk = (b[1].memory_state === "reactivation" || b[1].at_risk) ? 1 : 0;
      if (aRisk !== bRisk) return bRisk - aRisk;
      return new Date(a[1].next_due) - new Date(b[1].next_due);
    });

  const watchDue = due.filter(([, card]) => fcLeechIsWatchMode(card));
  const reactivationDue = due.filter(([, card]) => !fcLeechIsWatchMode(card) && (card.memory_state === "reactivation" || card.at_risk));
  const regularDue = due.filter(([, card]) => !fcLeechIsWatchMode(card) && !(card.memory_state === "reactivation" || card.at_risk));
  // Strict share: cap can be 0 (watch cards fully excluded when budget is small).
  // Starvation guard: any watch card overdue >= watch_starvation_days bypasses the cap.
  const starvationDays = Number.isFinite(fcSettings.watch_starvation_days) ? fcSettings.watch_starvation_days : 3;
  const watchCap = Math.min(
    fcSettings.watch_mode_max_per_session,
    Math.floor(reviewBudget * fcSettings.watch_mode_max_share)
  );

  const queue = [];
  let usedReviews = 0;
  let usedNew = 0;

  // Priority path: strict share cap, but starved cards bypass it entirely.
  const nowMs = Date.now();
  let usedWatch = 0;
  const starvedWatch = [];
  const cappedWatch = [];
  for (const [name, card] of watchDue) {
    const overdueDays = (nowMs - new Date(card.next_due).getTime()) / (1000 * FC_DAY_SECONDS);
    if (overdueDays >= starvationDays) {
      starvedWatch.push([name, card]);
    } else {
      cappedWatch.push([name, card]);
    }
  }
  // Starved first (no cap consumed).
  for (const [name, card] of starvedWatch) {
    if (usedReviews >= reviewBudget) break;
    const isNew = (card.reps || 0) === 0;
    if (isNew && usedNew >= newLeft) continue;
    queue.push(name);
    usedReviews += 1;
    if (isNew) usedNew += 1;
  }
  // Capped watch cards: respect strict share.
  for (const [name, card] of cappedWatch) {
    if (usedReviews >= reviewBudget || usedWatch >= watchCap) break;
    const isNew = (card.reps || 0) === 0;
    if (isNew && usedNew >= newLeft) continue;
    queue.push(name);
    usedReviews += 1;
    usedWatch += 1;
    if (isNew) usedNew += 1;
  }

  // State-aware fill: continue with regular due queue.
  for (const [name, card] of reactivationDue) {
    if (usedReviews >= reviewBudget) break;
    const isNew = (card.reps || 0) === 0;
    if (isNew && usedNew >= newLeft) continue;
    if (queue.includes(name)) continue;
    queue.push(name);
    usedReviews += 1;
    if (isNew) usedNew += 1;
  }

  // State-aware fill: continue with regular due queue.
  for (const [name, card] of regularDue) {
    if (usedReviews >= reviewBudget) break;
    const isNew = (card.reps || 0) === 0;
    if (isNew && usedNew >= newLeft) continue;
    queue.push(name);
    usedReviews += 1;
    if (isNew) usedNew += 1;
  }
  return queue;
}

function fcUpdateSessionUi(message) {
  const startBtn = document.getElementById("fcStartSessionBtn");
  const stopBtn = document.getElementById("fcStopSessionBtn");
  const status = document.getElementById("fcSessionStatus");
  const snoozeBtn = document.getElementById("fcSnoozeReminderBtn");
  if (!fcSessionActive) {
    startBtn.style.display = "";
    stopBtn.style.display = "none";
    status.textContent = message || "";
    if (snoozeBtn) snoozeBtn.style.display = "none";
    if (!message) fcUpdateBackupReminderUi();
    return;
  }
  startBtn.style.display = "none";
  stopBtn.style.display = "";
  if (snoozeBtn) snoozeBtn.style.display = "none";
  const reviewed = fcSessionTotal - fcSessionQueue.length;
  status.textContent = "Due session: " + reviewed + "/" + fcSessionTotal + " reviewed";
}

function fcStartDueSession() {
  const data = fcLoadData();
  const queue = fcDueQueue(data);
  if (queue.length === 0) {
    fcSessionActive = false;
    fcSessionQueue = [];
    fcSessionTotal = 0;
    fcUpdateSessionUi(fcNoQueueMessage(data));
    return;
  }
  fcSessionActive = true;
  data.meta.behavior.sessions_started += 1;
  data.meta.behavior.last_session_started_at_ms = Date.now();
  fcSaveData(data);
  fcSessionQueue = queue.slice();
  fcSessionTotal = queue.length;
  fcCurrentTab = "due";
  document.querySelectorAll(".fc-tab").forEach((t) => t.classList.remove("active"));
  const dueTab = Array.from(document.querySelectorAll(".fc-tab")).find((btn) => btn.textContent.trim() === "Due now");
  if (dueTab) dueTab.classList.add("active");
  fcUpdateSessionUi();
  fcStartReview(fcSessionQueue[0], true);
}

function fcReviewNextDue() {
  const data = fcLoadData();
  const queue = fcDueQueue(data);
  if (queue.length === 0) {
    fcUpdateSessionUi(fcNoQueueMessage(data));
    return;
  }
  // Single-card mode: open earliest due without session queue state.
  fcCurrentTab = "due";
  document.querySelectorAll(".fc-tab").forEach((t) => t.classList.remove("active"));
  const dueTab = Array.from(document.querySelectorAll(".fc-tab")).find((btn) => btn.textContent.trim() === "Due now");
  if (dueTab) dueTab.classList.add("active");
  fcStartReview(queue[0], false);
}

function fcStopDueSession(message) {
  const data = fcLoadData();
  fcEnsureMeta(data);
  if (fcSessionActive && fcSessionTotal > 0 && fcSessionQueue.length === 0) {
    data.meta.behavior.sessions_completed += 1;
    fcSaveData(data);
  }
  fcSessionActive = false;
  fcSessionQueue = [];
  fcSessionTotal = 0;
  fcReviewing = null;
  document.getElementById("fcStatsBar").style.display = "";
  fcUpdateSessionUi(message || "");
  fcRender();
}

function fcAdvanceSessionFrom(currentName) {
  if (!fcSessionActive) return false;
  fcSessionQueue = fcSessionQueue.filter((name) => name !== currentName);
  if (fcSessionQueue.length === 0) {
    fcStopDueSession("Due session complete");
    return true;
  }
  fcUpdateSessionUi();
  fcStartReview(fcSessionQueue[0], true);
  return true;
}

function fcRenderCards(data) {
  const list = document.getElementById("fcCardList");
  const entries = Object.entries(data.cards);
  let filtered = entries;
  if (fcCurrentTab === "due") filtered = entries.filter(([, c]) => fcIsDue(c));
  if (fcCurrentTab === "ok") filtered = entries.filter(([, c]) => !fcIsDue(c) && c.reps > 0);

  if (filtered.length === 0) {
    list.innerHTML = '<div class="fc-empty">No cards here yet.</div>';
    return;
  }

  list.innerHTML = filtered.map(([name, card]) => {
    const safeName = fcEscapeHtml(name);
    const safePrompt = fcEscapeHtml(card.prompt);
    const nameArg = fcEscapeJsSingleQuoted(name);
    const ret = fcGetRetention(card);
    const retPct = Math.round(ret * 100);
    const due = fcIsDue(card);
    const isLeechSuspended = fcLeechIsSuspended(card);
    const isLeechWatch = fcLeechIsWatchMode(card);
    const isAtRisk = Boolean(card.at_risk);
    const badgeClass = due ? "fc-badge-due" : (ret > 0.75 ? "fc-badge-ok" : "fc-badge-soon");
    let badgeText = due ? "due now" : fcFormatDue(card);
    if (isAtRisk) badgeText = "at-risk";
    if (isLeechWatch) badgeText = "leech-watch";
    if (isLeechSuspended) badgeText = "leech-suspended";
    const barColor = ret > 0.75 ? "#86efac" : ret > 0.5 ? "#fcd34d" : "#fca5a5";
    return (
      '<div class="fc-row" onclick="fcStartReview(\'' + nameArg + '\')">' +
        '<div class="fc-info">' +
          '<div class="fc-name">' + safeName + "</div>" +
          '<div class="fc-meta">' + safePrompt +
            " · type: " + fcEscapeHtml(card.memory_type || "fact") +
            " · group: " + fcEscapeHtml(card.memory_group || "general") +
            " · state: " + fcEscapeHtml(card.memory_state || "learning") +
            " · reps: " + card.reps +
            " · lapses: " + card.lapses +
            " · S: " + card.stability.toFixed(2) + "d" +
            " · D: " + card.difficulty.toFixed(2) +
            " · R: " + retPct + "%" +
            " · conf: " + Math.round((card.confidence || 0) * 100) + "%" +
            " · long: " + Math.round((card.long_term_confidence || 0) * 100) + "%" +
            " · consol: " + Math.round((card.consolidation_score || 0) * 100) + "%" +
            " · horizon: " + Math.round(card.retention_horizon_days || 0) + "d" +
            " · interval: " + card.interval_days.toFixed(2) + "d" +
          "</div>" +
        "</div>" +
        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">' +
          '<span class="fc-badge ' + ((isLeechSuspended || isLeechWatch) ? "fc-badge-soon" : badgeClass) + '">' + badgeText + "</span>" +
          '<div style="display:flex;align-items:center;gap:6px;">' +
            '<div class="fc-ret-bar"><div class="fc-ret-fill" style="width:' + retPct + "%;background:" + barColor + ';"></div></div>' +
            '<span style="font-size:11px;color:#9ca3af;min-width:28px">' + retPct + "%</span>" +
          "</div>" +
        "</div>" +
      "</div>"
    );
  }).join("");
}

function fcRender() {
  const data = fcLoadData();
  fcRenderStats(data);
  if (!fcReviewing) {
    document.getElementById("fcCardList").style.display = "";
    document.getElementById("fcReviewPanel").style.display = "none";
    fcRenderCards(data);
  }
}

function fcSetTab(tab, el) {
  fcCurrentTab = tab;
  document.querySelectorAll(".fc-tab").forEach((t) => t.classList.remove("active"));
  el.classList.add("active");
  fcRender();
}

function fcStartReview(name, fromSession) {
  const data = fcLoadData();
  const card = data.cards[name];
  if (!card) {
    if (fcSessionActive && fromSession) fcAdvanceSessionFrom(name);
    return;
  }
  fcReviewing = name;
  document.getElementById("fcCardList").style.display = "none";
  document.getElementById("fcStatsBar").style.display = "none";
  const panel = document.getElementById("fcReviewPanel");
  panel.style.display = "";
  const safeName = fcEscapeHtml(name);
  const safePrompt = fcEscapeHtml(card.prompt);
  const safeAnswer = fcEscapeHtml(card.answer);
  const nameArg = fcEscapeJsSingleQuoted(name);
  panel.innerHTML =
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem;">' +
      '<button class="fc-btn-secondary" onclick="fcExitReview()" style="font-size:13px;padding:6px 12px;">← back</button>' +
      '<span style="font-size:14px;color:#9ca3af;">' + safeName + "</span>" +
    "</div>" +
    '<div class="fc-panel">' +
      '<div class="fc-panel-title">' + safePrompt + "</div>" +
      '<div class="fc-panel-prompt">Type: ' + fcEscapeHtml(card.memory_type || "fact") + " · Group: " + fcEscapeHtml(card.memory_group || "general") + " · State: " + fcEscapeHtml(card.memory_state || "learning") + " · Consolidation: " + Math.round((card.consolidation_score || 0) * 100) + "% · Horizon: " + Math.round(card.retention_horizon_days || 0) + "d</div>" +
      '<div class="fc-panel-prompt">Type your recall, evaluate it, then choose a manual grade.</div>' +
      '<textarea id="fcRecallBox" class="fc-textarea" placeholder="Start typing your recall..."></textarea>' +
      '<div class="fc-grade-result" id="fcGradeResult"></div>' +
      '<div class="fc-answer-reveal" id="fcAnswerReveal">' + safeAnswer + "</div>" +
      '<div class="fc-rate-row">' +
        '<button class="fc-rate-btn" id="fcRate0" onclick="fcApplyGrade(\'' + nameArg + '\',0)" disabled>Again</button>' +
        '<button class="fc-rate-btn" id="fcRate1" onclick="fcApplyGrade(\'' + nameArg + '\',1)" disabled>Hard</button>' +
        '<button class="fc-rate-btn" id="fcRate2" onclick="fcApplyGrade(\'' + nameArg + '\',2)" disabled>Good</button>' +
        '<button class="fc-rate-btn" id="fcRate3" onclick="fcApplyGrade(\'' + nameArg + '\',3)" disabled>Easy</button>' +
      "</div>" +
      '<div class="fc-btn-row">' +
        '<button class="fc-btn-primary" id="fcSubmitBtn" onclick="fcSubmitRecall(\'' + nameArg + '\')">Evaluate recall</button>' +
        '<button class="fc-btn-secondary" onclick="fcPostponeCard(\'' + nameArg + '\')">Postpone 10m</button>' +
      "</div>" +
    "</div>";
}

function fcSubmitRecall(name) {
  const data = fcLoadData();
  const card = data.cards[name];
  if (!card) {
    fcUpdateSessionUi("Card missing, refresh list");
    fcExitReview();
    return;
  }
  const user = document.getElementById("fcRecallBox").value;
  const score = fcScore(user, card.answer);
  const suggested = fcRecommendRating(score);
  const resultEl = document.getElementById("fcGradeResult");
  resultEl.className = "fc-grade-result fc-grade-1";
  resultEl.style.display = "";
  resultEl.innerHTML = "Auto score: <strong>" + score + "%</strong> — suggested: <strong>" + fcRatingLabel(suggested) + "</strong>. Choose your final grade below.";
  document.getElementById("fcAnswerReveal").style.display = "";
  const submitBtn = document.getElementById("fcSubmitBtn");
  submitBtn.disabled = true;
  submitBtn.style.opacity = "0.4";
  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById("fcRate" + i);
    btn.disabled = false;
    if (i === suggested) btn.classList.add("active");
    else btn.classList.remove("active");
  }
}

function fcApplyGrade(name, rating) {
  const data = fcLoadData();
  const card = data.cards[name];
  if (!card) {
    fcUpdateSessionUi("Card missing, refresh list");
    fcExitReview();
    return;
  }
  fcEnsureMeta(data);
  const activeBtn = document.querySelector(".fc-rate-btn.active");
  const suggested = activeBtn ? Number(String(activeBtn.id).replace("fcRate", "")) : null;
  if (Number.isFinite(suggested) && suggested !== rating) data.meta.behavior.manual_grade_changes += 1;
  const wasNew = (card.reps || 0) === 0;
  const lastReviewMs = new Date(card.last_review).getTime();
  const actualElapsedDays = Number.isFinite(lastReviewMs)
    ? Math.max(0, (Date.now() - lastReviewMs) / (1000 * FC_DAY_SECONDS))
    : 0;
  const scheduledIntervalDays = Number.isFinite(card.interval_days) ? Math.max(0, card.interval_days) : 0;
  const updateInfo = fcUpdateCard(card, rating);
  fcUpdateStruggleSignals(card, rating);
  data.meta.reviews_done += 1;
  if (wasNew) data.meta.new_done += 1;
  const leechAction = fcApplyLeechPolicy(card, rating);
  fcAppendReviewLog(data, {
    ts: new Date().toISOString(),
    card: name,
    grade: rating,
    was_new: wasNew,
    actual_elapsed_days: Math.round(actualElapsedDays * 10000) / 10000,
    scheduled_interval_days: Math.round(scheduledIntervalDays * 10000) / 10000,
    delay_days: Math.round((actualElapsedDays - scheduledIntervalDays) * 10000) / 10000,
    prev_interval_days: updateInfo.prev_interval_days,
    prev_stability_days: updateInfo.prev_stability_days,
    retrievability: Math.round(updateInfo.retrievability * 10000) / 10000,
    next_interval_days: card.interval_days,
    next_stability_days: Math.round(card.stability * 1000) / 1000,
    difficulty: card.difficulty,
    memory_state: card.memory_state,
    confidence: card.confidence,
    long_term_confidence: card.long_term_confidence,
    consolidation_score: card.consolidation_score,
    leech_action: leechAction.type
  });
  const ranAutoCalibration = fcAutoCalibrateMaybe(data);
  if (!fcSaveData(data)) return;
  const resultEl = document.getElementById("fcGradeResult");
  resultEl.className = "fc-grade-result " + (rating === 0 ? "fc-grade-0" : (rating === 1 ? "fc-grade-1" : "fc-grade-2"));
  resultEl.style.display = "";
  resultEl.innerHTML = "<strong>" + fcRatingLabel(rating) + "</strong> saved — next review " + fcFormatDueFromCard(card);
  if (leechAction.type === "lapse_suspend") resultEl.innerHTML += " · leech suspended for " + fcSettings.leech_suspend_days + " day(s)";
  if (leechAction.type === "mixed_watch") resultEl.innerHTML += " · mixed-struggle watch mode enabled";
  if (ranAutoCalibration) resultEl.innerHTML += " · auto calibration applied";
  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById("fcRate" + i);
    btn.disabled = true;
    btn.classList.remove("active");
  }
  fcRenderStats(data);
  if (fcAdvanceSessionFrom(name)) return;
}

function fcPostponeCard(name) {
  const data = fcLoadData();
  if (!data.cards[name]) {
    fcUpdateSessionUi("Card missing, refresh list");
    fcExitReview();
    return;
  }
  fcEnsureMeta(data);
  data.cards[name].next_due = new Date(Date.now() + 10 * 60 * 1000).toISOString();
  fcUpdateDerivedCardState(data.cards[name]);
  data.meta.behavior.postpones += 1;
  if (!fcSaveData(data)) return;
  if (fcAdvanceSessionFrom(name)) return;
  fcExitReview();
}

function fcExitReview() {
  fcReviewing = null;
  document.getElementById("fcStatsBar").style.display = "";
  if (fcSessionActive) {
    fcUpdateSessionUi();
  }
  fcRender();
}

function fcToggleAdd() {
  const form = document.getElementById("fcAddForm");
  const isHidden = window.getComputedStyle(form).display === "none";
  form.style.display = isHidden ? "block" : "none";
  if (isHidden) {
    document.getElementById("fcSettingsForm").style.display = "none";
    document.getElementById("fcSnapshotsForm").style.display = "none";
  }
}

function fcAddCard() {
  const name = document.getElementById("fcNewName").value.trim();
  const prompt = document.getElementById("fcNewPrompt").value.trim();
  const memoryType = document.getElementById("fcNewMemoryType").value;
  const tagsRaw = document.getElementById("fcNewTags").value.trim();
  const requestedGroup = document.getElementById("fcNewGroup").value.trim();
  const answer = document.getElementById("fcNewAnswer").value.trim();
  const duplicateHintEl = document.getElementById("fcAddDuplicateHint");
  if (duplicateHintEl) duplicateHintEl.textContent = "";
  if (!name || !answer) {
    fcUpdateSessionUi("Card name and answer are required.");
    return;
  }
  const data = fcLoadData();
  fcEnsureMeta(data);
  if (data.cards[name]) {
    const overwrite = window.confirm("A card with this name already exists. Replace it?");
    if (!overwrite) return;
  }
  data.cards[name] = {
    prompt: prompt || "Recall content",
    answer: answer,
    memory_type: fcNormalizeMemoryType(memoryType),
    tags: fcNormalizeTagList(tagsRaw),
    memory_group: requestedGroup || "",
    stability: 10.0,
    difficulty: 5.0,
    retrievability: 1.0,
    interval_days: 0.01,
    last_review: new Date().toISOString(),
    next_due: new Date().toISOString(),
    reps: 0,
    lapses: 0
  };
  fcNormalizeCard(data.cards[name]);
  fcAssignGroup(data.cards[name], requestedGroup);
  fcDetectDuplicates(data, name, data.cards[name]);
  fcUpdateDerivedCardState(data.cards[name]);
  const dupTarget = data.cards[name].duplicate_of ? data.cards[data.cards[name].duplicate_of] : null;
  if (dupTarget) {
    data.cards[name].memory_group = dupTarget.memory_group;
    data.cards[name].memory_group_id = dupTarget.memory_group_id;
    if (duplicateHintEl) {
      duplicateHintEl.textContent = "Potential duplicate detected: " + data.cards[name].duplicate_of + ". Card inherited its memory group.";
    }
  }
  fcRebuildIndexes(data);
  if (!fcSaveData(data)) return;
  document.getElementById("fcNewName").value = "";
  document.getElementById("fcNewPrompt").value = "";
  document.getElementById("fcNewMemoryType").value = "fact";
  document.getElementById("fcNewTags").value = "";
  document.getElementById("fcNewGroup").value = "";
  document.getElementById("fcNewAnswer").value = "";
  document.getElementById("fcAddForm").style.display = "none";
  fcUpdateSessionUi("Card added.");
  fcRender();
}

function fcPreviewDuplicateHint() {
  const hint = document.getElementById("fcAddDuplicateHint");
  if (!hint) return;
  const name = document.getElementById("fcNewName").value.trim();
  const prompt = document.getElementById("fcNewPrompt").value.trim();
  const answer = document.getElementById("fcNewAnswer").value.trim();
  if (!name || !answer) {
    hint.textContent = "";
    return;
  }
  const data = fcLoadData();
  const probe = {
    prompt: prompt || "Recall content",
    answer: answer,
    memory_type: fcNormalizeMemoryType(document.getElementById("fcNewMemoryType").value),
    tags: fcNormalizeTagList(document.getElementById("fcNewTags").value.trim()),
    memory_group: document.getElementById("fcNewGroup").value.trim(),
    interval_days: 0.01,
    stability: 0.01,
    difficulty: 5,
    retrievability: 1,
    reps: 0,
    lapses: 0
  };
  fcNormalizeCard(probe);
  fcDetectDuplicates(data, name, probe);
  if (probe.duplicate_of) {
    const kind = probe.near_duplicates.length > 1 ? "near-duplicate cluster" : "possible duplicate";
    hint.textContent = "Detected " + kind + ": " + probe.duplicate_of;
  } else {
    hint.textContent = "";
  }
}

function fcBindUiHandlers() {
  const settingsBtn = document.getElementById("fcSettingsBtn");
  if (settingsBtn) settingsBtn.addEventListener("click", function onSettingsClick(e) { e.preventDefault(); fcToggleSettings(); });
  const snapshotsBtn = document.getElementById("fcSnapshotsBtn");
  if (snapshotsBtn) snapshotsBtn.addEventListener("click", function onSnapshotsClick(e) { e.preventDefault(); fcToggleSnapshots(); });
  ["fcNewName", "fcNewPrompt", "fcNewAnswer", "fcNewMemoryType", "fcNewTags", "fcNewGroup"].forEach((id) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("input", fcPreviewDuplicateHint);
  });
}

renderState();
logEnergy();
fcSettings = fcLoadSettings();
fcApplySettingsToForm();
fcBindUiHandlers();
fcRender();
setInterval(fcRender, 5000);
fcUpdateSessionUi();
fcUpdateBackupReminderUi();
</script>
