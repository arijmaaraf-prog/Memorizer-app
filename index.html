<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Memory Model Suite</title>

<style>
body { font-family: Arial, sans-serif; background: #0f1115; color: #eaeaea; padding: 20px; }
.container { max-width: 900px; margin: auto; }
h2 { margin-bottom: 10px; }
.suite-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
.suite-tab {
  border: 1px solid #2f3441;
  background: #141821;
  color: #d5d7df;
  padding: 8px 12px;
  border-radius: 999px;
  cursor: pointer;
}
.suite-tab.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
.suite-view { display: none; }
.suite-view.active { display: block; }
textarea {
  width: 100%;
  height: 120px;
  margin-top: 10px;
  background: #1a1d24;
  color: #fff;
  border: 1px solid #333;
  padding: 10px;
  border-radius: 8px;
  box-sizing: border-box;
}
button {
  margin-top: 10px;
  margin-right: 8px;
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}
button.secondary { background: #4b5563; }
.card {
  background: #1a1d24;
  padding: 15px;
  border-radius: 10px;
  margin-top: 15px;
}
.small { font-size: 12px; color: #aaa; }
.error { color: #f87171; margin-top: 8px; min-height: 18px; }

/* Forgetting-curve module styles (prefixed with fc-) */
.fc-root { margin-top: 15px; }
.fc-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1.2rem; }
.fc-header h3 { font-size: 18px; font-weight: 600; color: #f3f4f6; }
.fc-header-actions { display: flex; gap: 8px; align-items: center; }
.fc-session-status { font-size: 12px; color: #93c5fd; }
.fc-stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 1.2rem; }
.fc-stat { background: #1a1d24; border-radius: 10px; padding: 0.75rem 1rem; border: 1px solid #2b3040; }
.fc-stat-label { font-size: 12px; color: #9ca3af; margin-bottom: 4px; }
.fc-stat-value { font-size: 20px; font-weight: 600; color: #f3f4f6; }
.fc-nav { display: flex; gap: 6px; margin-bottom: 1rem; }
.fc-tab {
  padding: 6px 14px;
  font-size: 13px;
  border: 1px solid #2f3441;
  border-radius: 20px;
  background: transparent;
  color: #c4c8d3;
  cursor: pointer;
}
.fc-tab.active { background: #f3f4f6; color: #111827; border-color: #f3f4f6; }
.fc-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1rem; }
.fc-row {
  background: #141821;
  border: 1px solid #2b3040;
  border-radius: 12px;
  padding: 1rem 1.1rem;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
}
.fc-row:hover { border-color: #4b5563; }
.fc-info { flex: 1; }
.fc-name { font-size: 15px; font-weight: 600; color: #f3f4f6; margin-bottom: 3px; }
.fc-meta { font-size: 12px; color: #9ca3af; }
.fc-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
.fc-badge-due { background: #3c1f22; color: #fca5a5; }
.fc-badge-soon { background: #3a2f1c; color: #fcd34d; }
.fc-badge-ok { background: #1f3624; color: #86efac; }
.fc-ret-bar { width: 80px; height: 6px; background: #30384b; border-radius: 3px; overflow: hidden; }
.fc-ret-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.fc-panel { background: #141821; border: 1px solid #2b3040; border-radius: 12px; padding: 1.2rem; }
.fc-panel-title { font-size: 16px; font-weight: 600; color: #f3f4f6; margin-bottom: 4px; }
.fc-panel-prompt { font-size: 13px; color: #9ca3af; margin-bottom: 0.9rem; }
.fc-textarea { height: 160px; }
.fc-btn-row { display: flex; gap: 10px; margin-top: 1rem; }
.fc-rate-row { display: grid; gap: 8px; grid-template-columns: repeat(4, minmax(0, 1fr)); margin-top: 10px; }
.fc-rate-btn {
  margin-top: 0;
  margin-right: 0;
  border: 1px solid #4b5563;
  border-radius: 8px;
  padding: 8px 10px;
  background: #11151e;
  color: #d1d5db;
  font-size: 12px;
  font-weight: 600;
}
.fc-rate-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.fc-rate-btn.active { border-color: #93c5fd; color: #dbeafe; background: #1e293b; }
.fc-btn-primary {
  flex: 1;
  padding: 10px;
  background: #f3f4f6;
  color: #111827;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
}
.fc-btn-secondary {
  padding: 10px 16px;
  background: transparent;
  color: #d1d5db;
  border: 1px solid #4b5563;
  border-radius: 8px;
}
.fc-grade-result { margin-top: 1rem; padding: 1rem; border-radius: 8px; font-size: 14px; display: none; }
.fc-grade-2 { background: #1f3624; color: #86efac; }
.fc-grade-1 { background: #3a2f1c; color: #fcd34d; }
.fc-grade-0 { background: #3c1f22; color: #fca5a5; }
.fc-answer-reveal {
  margin-top: 1rem;
  padding: 1rem;
  background: #11151e;
  border-radius: 8px;
  font-family: Consolas, monospace;
  font-size: 12px;
  color: #9ca3af;
  white-space: pre-wrap;
  display: none;
}
.fc-add-form {
  background: #141821;
  border: 1px solid #2b3040;
  border-radius: 12px;
  padding: 1.1rem;
  margin-bottom: 1rem;
  display: none;
}
.fc-field { margin-bottom: 0.9rem; }
.fc-field label { display: block; font-size: 12px; color: #9ca3af; margin-bottom: 6px; }
.fc-field input, .fc-field textarea {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid #3a4152;
  border-radius: 8px;
  background: #11151e;
  color: #f3f4f6;
  font-size: 14px;
  outline: none;
}
.fc-field textarea { font-family: Consolas, monospace; font-size: 13px; height: 100px; resize: vertical; }
.fc-empty { text-align: center; padding: 1.5rem; color: #9ca3af; font-size: 14px; }
.fc-modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.65);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.fc-modal.active { display: flex; }
.fc-modal-card {
  width: min(560px, calc(100vw - 32px));
  background: #141821;
  border: 1px solid #2b3040;
  border-radius: 12px;
  padding: 16px;
}
.fc-modal-title { font-size: 18px; font-weight: 600; color: #f3f4f6; margin-bottom: 8px; }
.fc-modal-text { color: #d1d5db; font-size: 14px; line-height: 1.5; }
</style>
</head>
<body>
<div class="container">
  <h2>Memory Model Suite</h2>
  <div class="suite-tabs">
    <button class="suite-tab active" onclick="setSuiteView('meanField', this)">Mean-Field</button>
    <button class="suite-tab" onclick="setSuiteView('forgettingCurve', this)">Forgetting Curve</button>
  </div>

  <div id="view-meanField" class="suite-view active">
    <div class="card">
      <div><b>State Vector (x)</b></div>
      <div class="small">Enter 8 numbers in (-1,1), separated by spaces.</div>
      <textarea id="stateBox"></textarea>
      <div id="stateError" class="small error"></div>
      <button onclick="step()">Run Step</button>
      <button class="secondary" onclick="randomizeState()">Randomize State</button>
    </div>

    <div class="card">
      <div><b>Energy Log</b></div>
      <div id="energyLog" class="small"></div>
    </div>
  </div>

  <div id="view-forgettingCurve" class="suite-view">
    <div class="fc-root">
      <div class="fc-header">
        <h3>Forgetting Curve Engine</h3>
        <div class="fc-header-actions">
          <span id="fcSessionStatus" class="fc-session-status"></span>
          <button class="fc-btn-secondary" onclick="fcSnoozeBackupReminder()" id="fcSnoozeReminderBtn" style="font-size:13px;padding:6px 14px;display:none;">Remind me tomorrow</button>
          <button class="fc-btn-secondary" onclick="fcExportBackup()" id="fcExportBtn" style="font-size:13px;padding:6px 14px;">Export backup</button>
          <button class="fc-btn-secondary" onclick="fcPickImportBackup()" id="fcImportBtn" style="font-size:13px;padding:6px 14px;">Import backup</button>
          <button class="fc-btn-secondary" type="button" id="fcSnapshotsBtn" style="font-size:13px;padding:6px 14px;">Snapshots</button>
          <button class="fc-btn-secondary" type="button" id="fcSettingsBtn" style="font-size:13px;padding:6px 14px;">Settings</button>
          <button class="fc-btn-secondary" onclick="fcReviewNextDue()" id="fcNextDueBtn" style="font-size:13px;padding:6px 14px;">Review next due</button>
          <button class="fc-btn-secondary" onclick="fcStartDueSession()" id="fcStartSessionBtn" style="font-size:13px;padding:6px 14px;">Review due only</button>
          <button class="fc-btn-secondary" onclick="fcStopDueSession()" id="fcStopSessionBtn" style="font-size:13px;padding:6px 14px;display:none;">End session</button>
          <button class="fc-btn-secondary" type="button" id="fcAddBtn" style="font-size:13px;padding:6px 14px;" onclick="fcToggleAdd()">+ add card</button>
        </div>
      </div>

      <div class="fc-add-form" id="fcSettingsForm">
        <div class="fc-field"><label>Daily review limit</label><input id="fcSettingReviewLimit" type="number" min="1" max="500" /></div>
        <div class="fc-field"><label>Daily new-card limit</label><input id="fcSettingNewLimit" type="number" min="0" max="200" /></div>
        <div class="fc-field"><label>Max session queue</label><input id="fcSettingMaxSessionQueue" type="number" min="5" max="200" /></div>
        <div class="fc-field"><label>Target retention (0.85 - 0.90)</label><input id="fcSettingTargetRetention" type="number" min="0.85" max="0.90" step="0.01" /></div>
        <div class="fc-field"><label><input id="fcSettingAutoCalibrationEnabled" type="checkbox" /> Enable auto calibration loop</label></div>
        <div class="fc-field"><label>Auto calibration minimum reviews</label><input id="fcSettingAutoCalibrationMinReviews" type="number" min="50" max="5000" /></div>
        <div class="fc-field"><label>Auto calibration window (days)</label><input id="fcSettingAutoCalibrationWindowDays" type="number" min="7" max="180" /></div>
        <div class="fc-field"><label>Calibration long-range window (days)</label><input id="fcSettingAutoCalibrationLongRangeDays" type="number" min="30" max="7300" /></div>
        <div class="fc-field"><label>Calibration long-range minimum reviews</label><input id="fcSettingAutoCalibrationLongRangeMinReviews" type="number" min="0" max="10000" /></div>
        <div class="fc-field"><label>Maximum retention horizon (days)</label><input id="fcSettingMaxHorizonDays" type="number" min="365" max="36500" /></div>
        <div class="fc-field"><label>Reactivation threshold (days overdue)</label><input id="fcSettingReactivationOverdueDays" type="number" min="1" max="365" /></div>
        <div class="fc-field"><label>Leech lapse threshold</label><input id="fcSettingLeechLapseThreshold" type="number" min="3" max="50" /></div>
        <div class="fc-field"><label>Leech suspend days (lapse trigger)</label><input id="fcSettingLeechSuspendDays" type="number" min="1" max="90" /></div>
        <div class="fc-field"><label>Mixed-struggle minimum reviews</label><input id="fcSettingMixedStruggleMinReviews" type="number" min="5" max="100" /></div>
        <div class="fc-field"><label>Mixed-struggle cooldown days</label><input id="fcSettingMixedStruggleCooldownDays" type="number" min="1" max="30" /></div>
        <div class="fc-field"><label>Watch mode max cards per session</label><input id="fcSettingWatchModeMaxPerSession" type="number" min="1" max="50" /></div>
        <div class="fc-field"><label>Watch mode max queue share (0.00 - 1.00)</label><input id="fcSettingWatchModeMaxShare" type="number" min="0.00" max="1.00" step="0.05" /></div>
        <div class="fc-field"><label>Watch starvation guard (days overdue to bypass cap)</label><input id="fcSettingWatchStarvationDays" type="number" min="0.5" max="30" step="0.5" /></div>
        <div class="fc-field"><label>Backup reminder interval (days, 0 to disable)</label><input id="fcSettingBackupReminderDays" type="number" min="0" max="365" step="1" /></div>
        <div class="fc-field"><label><input id="fcSettingHardReminderEnabled" type="checkbox" /> Enable hard overdue popup reminder</label></div>
        <div class="fc-field"><label>Hard reminder threshold (days overdue)</label><input id="fcSettingHardReminderDays" type="number" min="1" max="365" step="1" /></div>
        <div class="fc-field"><label>FSRS w coefficients (comma-separated, 17 values)</label><textarea id="fcSettingFsrsWeights" style="height:72px;"></textarea></div>
        <div class="fc-field"><label>Snapshot history limit</label><input id="fcSettingSnapshotLimit" type="number" min="5" max="100" /></div>
        <div style="display:flex;gap:10px;">
          <button class="fc-btn-primary" onclick="fcSaveSettings()">Save settings</button>
          <button class="fc-btn-secondary" onclick="fcExportCalibrationData()">Export review logs</button>
          <button class="fc-btn-secondary" onclick="fcRunCalibrationHook()">Run calibration hook</button>
          <button class="fc-btn-secondary" onclick="fcEvaluateCalibration()">Evaluate calibration</button>
          <button class="fc-btn-secondary" onclick="fcToggleSettings()">Close</button>
        </div>
        <div id="fcCalibrationInfo" class="small" style="margin-top:8px;"></div>
      </div>

      <div class="fc-add-form" id="fcSnapshotsForm">
        <div id="fcSnapshotsList" class="fc-empty">No snapshots yet.</div>
      </div>

      <div class="fc-add-form" id="fcAddForm">
        <div class="fc-field"><label>Card name</label><input id="fcNewName" placeholder="e.g. Full block" /></div>
        <div class="fc-field"><label>Prompt</label><input id="fcNewPrompt" placeholder="e.g. Recall full sequence" /></div>
        <div class="fc-field">
          <label>Memory type</label>
          <select id="fcNewMemoryType" style="width:100%;padding:8px 10px;border:1px solid #3a4152;border-radius:8px;background:#11151e;color:#f3f4f6;font-size:14px;outline:none;">
            <option value="fact">Fact</option>
            <option value="formula">Formula</option>
            <option value="procedure">Procedure</option>
            <option value="definition">Definition</option>
            <option value="note">Personal study note</option>
          </select>
        </div>
        <div class="fc-field"><label>Tags (comma-separated)</label><input id="fcNewTags" placeholder="e.g. anatomy, chapter-2, exam-a" /></div>
        <div class="fc-field"><label>Memory group (optional)</label><input id="fcNewGroup" placeholder="e.g. neuroanatomy core" /></div>
        <div class="fc-field"><label>Answer</label><textarea id="fcNewAnswer" placeholder="Enter the content to memorize..."></textarea></div>
        <div id="fcAddDuplicateHint" class="small" style="min-height:18px;"></div>
        <div style="display:flex;gap:10px;">
          <button class="fc-btn-primary" type="button" id="fcAddCardSubmitBtn" onclick="fcAddCard()">Add card</button>
          <button class="fc-btn-secondary" type="button" id="fcAddCardCancelBtn" onclick="fcToggleAdd()">Cancel</button>
        </div>
      </div>

      <div class="fc-stats" id="fcStatsBar"></div>

      <div class="fc-nav">
        <button class="fc-tab active" onclick="fcSetTab('all', this)">All</button>
        <button class="fc-tab" onclick="fcSetTab('due', this)">Due now</button>
        <button class="fc-tab" onclick="fcSetTab('ok', this)">Learned</button>
      </div>

      <div id="fcCardList" class="fc-list"></div>
      <div id="fcReviewPanel" style="display:none;"></div>
      <input id="fcImportFile" type="file" accept=".json,application/json" style="display:none;" onchange="fcImportBackup(event)" />
    </div>
    <div id="fcHardReminderModal" class="fc-modal">
      <div class="fc-modal-card">
        <div class="fc-modal-title">Backup overdue</div>
        <div id="fcHardReminderText" class="fc-modal-text"></div>
        <div style="display:flex;gap:10px;margin-top:12px;">
          <button class="fc-btn-primary" onclick="fcExportBackupFromModal()">Export backup now</button>
          <button class="fc-btn-secondary" onclick="fcSnoozeHardReminder()">Remind me tomorrow</button>
          <button class="fc-btn-secondary" onclick="fcCloseHardReminder()">Dismiss</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function setSuiteView(view, btn) {
  document.querySelectorAll(".suite-view").forEach((v) => v.classList.remove("active"));
  document.querySelectorAll(".suite-tab").forEach((b) => b.classList.remove("active"));
  document.getElementById("view-" + view).classList.add("active");
  btn.classList.add("active");
}

// -----------------------------
// Mean-field memory engine
// -----------------------------
const N = 8;
const beta = 2.0;
const eta = 0.05;

function clampToOpenUnit(v) {
  return Math.max(-0.999, Math.min(0.999, v));
}

function createSymmetricWeights(n) {
  const M = Array.from({ length: n }, () => Array.from({ length: n }, () => 0));
  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      const val = (Math.random() * 2 - 1) * 0.5;
      M[i][j] = val;
      M[j][i] = val;
    }
  }
  return M;
}

const W = createSymmetricWeights(N);
const b = Array.from({ length: N }, () => Math.random() * 0.2 - 0.1);
let x = Array.from({ length: N }, () => Math.random() * 0.2 - 0.1);

function renderState() {
  document.getElementById("stateBox").value = x.map((v) => v.toFixed(4)).join(" ");
}

function showStateError(msg) {
  document.getElementById("stateError").textContent = msg;
}

function parseStateFromInput() {
  const raw = document.getElementById("stateBox").value.trim();
  if (!raw) {
    showStateError("State vector is empty.");
    return null;
  }

  const values = raw.split(/\s+/).map(Number);
  if (values.length !== N) {
    showStateError("Expected " + N + " values, got " + values.length + ".");
    return null;
  }

  for (let i = 0; i < values.length; i++) {
    if (!Number.isFinite(values[i])) {
      showStateError("Invalid number at position " + (i + 1) + ".");
      return null;
    }
  }

  showStateError("");
  return values.map(clampToOpenUnit);
}

function entropy(xi) {
  const c = clampToOpenUnit(xi);
  return ((1 + c) / 2) * Math.log((1 + c) / 2) + ((1 - c) / 2) * Math.log((1 - c) / 2);
}

function energy(vec) {
  let E = 0;
  for (let i = 0; i < N; i++) {
    for (let j = 0; j < N; j++) {
      E += -0.5 * vec[i] * W[i][j] * vec[j];
    }
  }
  for (let i = 0; i < N; i++) {
    E += -b[i] * vec[i];
  }
  for (let i = 0; i < N; i++) {
    E += (1 / beta) * entropy(vec[i]);
  }
  return E;
}

function step() {
  const parsed = parseStateFromInput();
  if (!parsed) return;
  x = parsed;

  const dx = new Array(N);
  for (let i = 0; i < N; i++) {
    const xi = clampToOpenUnit(x[i]);
    let wx = 0;
    for (let j = 0; j < N; j++) {
      wx += W[i][j] * x[j];
    }
    const gradEntropy = (1 / (2 * beta)) * Math.log((1 + xi) / (1 - xi));
    dx[i] = wx + b[i] - gradEntropy;
  }

  for (let i = 0; i < N; i++) {
    x[i] = clampToOpenUnit(x[i] + eta * dx[i]);
  }

  renderState();
  logEnergy();
}

function logEnergy() {
  const e = energy(x);
  document.getElementById("energyLog").innerText = "Energy: " + e.toFixed(6);
}

function randomizeState() {
  x = Array.from({ length: N }, () => Math.random() * 0.2 - 0.1);
  showStateError("");
  renderState();
  logEnergy();
}

// -----------------------------
// Forgetting curve engine
// -----------------------------
const FC_STORAGE_KEY = "memory_engine";
const FC_SNAPSHOT_KEY = "memory_engine_snapshots";
const FC_SETTINGS_KEY = "memory_engine_settings";
const FC_SCHEMA_VERSION = 4;
const FC_DAY_SECONDS = 24 * 60 * 60;
// Keep longer telemetry for bounded long-range calibration sampling while remaining capped.
const FC_REVIEW_LOG_LIMIT = 20000;
const FC_MEMORY_TYPES = ["fact", "formula", "procedure", "definition", "note"];
const FC_NEAR_DUPLICATE_JACCARD = 0.82;
const FC_AT_RISK_INTERVAL_FACTOR = 0.7;
const FC_AT_RISK_RETRIEVABILITY = 0.4;
const FC_STABLE_MIN_GROWTH = 1.2;
const FC_FSRS_DEFAULT_W = [
  0.57, 1.44, 4.14, 10.94,
  5.14, 1.20, 0.94, 0.86,
  0.01, 1.49, 0.14, 0.94,
  2.18, 0.05, 0.34, 1.26, 0.29
];
const FC_DEFAULTS = {
  daily_review_limit: 40,
  daily_new_limit: 15,
  max_session_queue: 30,
  auto_calibration_enabled: true,
  auto_calibration_min_reviews: 200,
  auto_calibration_window_days: 30,
  auto_calibration_long_range_days: 1460,
  auto_calibration_long_range_min_reviews: 120,
  leech_lapse_threshold: 8,
  leech_suspend_days: 7,
  mixed_struggle_min_reviews: 10,
  mixed_struggle_cooldown_days: 2,
  watch_mode_max_per_session: 4,
  watch_mode_max_share: 0.35,
  watch_starvation_days: 3,
  max_snapshots: 20,
  target_retention: 0.9,
  // ~100 years upper cap keeps deterministic long-horizon growth bounded.
  max_horizon_days: 36500,
  reactivation_overdue_days: 30,
  backup_reminder_days: 7,
  hard_reminder_enabled: false,
  hard_reminder_days: 14,
  backup_last_export_at: "",
  backup_snooze_until: "",
  fsrs_w: FC_FSRS_DEFAULT_W
};
let fcCurrentTab = "all";
let fcReviewing = null;
let fcSessionActive = false;
let fcSessionQueue = [];
let fcSessionTotal = 0;
let fcSettings = { ...FC_DEFAULTS };
let fcHardReminderCheckedOnce = false;

const fcDefaultCards = {
  "Full Block": {
    prompt: "Recall full sequence",
    answer: "CIB DE DAI HFE\n\nEHX RNQ EAM TZ\n\nIFK LGK FGLL\n\nERI CCS BAUY\n\nEBS CCF OKH BEHJ\n\nHOT RWW WAT XSTV\n\nABE IJJ ILJ CCQP\n\nRHM SCW PKQ GSAS",
    stability: 12.0,
    difficulty: 2.5,
    last_review: new Date().toISOString(),
    next_due: new Date().toISOString(),
    reps: 0,
    lapses: 0
  }
};

function fcSlug(value) {
  return String(value || "")
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "")
    .slice(0, 80);
}

function fcNormalizeTagList(raw) {
  if (Array.isArray(raw)) {
    return Array.from(new Set(raw.map((x) => fcSlug(x)).filter(Boolean))).slice(0, 24);
  }
  if (typeof raw !== "string") return [];
  const tags = raw.split(",").map((x) => fcSlug(x)).filter(Boolean);
  return Array.from(new Set(tags)).slice(0, 24);
}

function fcCardFingerprint(card) {
  const base = [
    fcNorm(card && card.prompt ? card.prompt : ""),
    fcNorm(card && card.answer ? card.answer : ""),
    String(card && card.memory_type ? card.memory_type : "fact").toLowerCase()
  ].join(" || ");
  return fcSlug(base).slice(0, 120);
}

function fcTokenSet(value) {
  const tokens = fcNorm(value).split(" ").filter((x) => x && x.length >= 2);
  return new Set(tokens.slice(0, 600));
}

function fcJaccardSimilarity(aSet, bSet) {
  if (!aSet.size || !bSet.size) return 0;
  let inter = 0;
  for (const t of aSet) if (bSet.has(t)) inter += 1;
  const union = aSet.size + bSet.size - inter;
  return union > 0 ? inter / union : 0;
}

function fcInferGroupLabel(card) {
  const tags = Array.isArray(card.tags) ? card.tags : [];
  if (tags.length > 0) return tags[0];
  if (card.prompt) {
    const words = fcNorm(card.prompt).split(" ").filter(Boolean);
    return words.slice(0, 3).join(" ").toLowerCase() || "general";
  }
  return String(card.memory_type || "general");
}

function fcGetOverdueDays(card) {
  const dueMs = new Date(card.next_due).getTime();
  if (!Number.isFinite(dueMs)) return 0;
  return Math.max(0, (Date.now() - dueMs) / (FC_DAY_SECONDS * 1000));
}

function fcRetentionHorizonDays(card) {
  const boundedRetention = Math.max(0.85, Math.min(0.9, Number(fcSettings.target_retention) || 0.9));
  const horizon = fcFsrsInterval(Math.max(0.01, Number(card.stability) || 0.01), boundedRetention);
  return Math.max(0.01, Math.min(Number(fcSettings.max_horizon_days) || FC_DEFAULTS.max_horizon_days, horizon));
}

function fcUpdateDerivedCardState(card) {
  const overdueDays = fcGetOverdueDays(card);
  const horizon = fcRetentionHorizonDays(card);
  const difficultyFactor = 1 - ((Math.max(1, Math.min(10, card.difficulty || 5)) - 1) / 9);
  const lapsePenalty = Math.min(0.35, (card.lapses || 0) * 0.03);
  const shortConfidence = 0.55 * (card.retrievability || 0) + 0.45 * difficultyFactor;
  card.confidence = Math.round(Math.max(0, Math.min(1, shortConfidence - lapsePenalty)) * 10000) / 10000;
  const ageFactor = Math.min(1, Math.log1p(Math.max(0, card.stability || 0)) / Math.log1p(3650));
  card.long_term_confidence = Math.round(Math.max(0, Math.min(1, 0.6 * card.confidence + 0.4 * ageFactor)) * 10000) / 10000;
  const consolid = Math.max(0, Math.min(1, 0.5 * Math.min(1, (card.reps || 0) / 12) + 0.5 * Math.min(1, (card.stability || 0) / 180)));
  card.consolidation_score = Math.round(consolid * 10000) / 10000;
  card.retention_horizon_days = Math.round(horizon * 1000) / 1000;
  const reactivationThreshold = Number(fcSettings.reactivation_overdue_days) || FC_DEFAULTS.reactivation_overdue_days;
  // At-risk if overdue by a large fraction of interval or already low retrievability.
  const atRiskWindow = Math.max(1, Math.min(reactivationThreshold, (card.interval_days || 1) * FC_AT_RISK_INTERVAL_FACTOR));
  const atRisk = overdueDays >= atRiskWindow || (card.retrievability || 0) < FC_AT_RISK_RETRIEVABILITY;
  card.at_risk = Boolean(atRisk);
  if ((card.reps || 0) < 3 || (card.stability || 0) < 7) card.memory_state = "learning";
  else if (atRisk || overdueDays >= reactivationThreshold) card.memory_state = "reactivation";
  else if ((card.stability || 0) >= 90 && (card.long_term_confidence || 0) >= 0.7) card.memory_state = "stable";
  else card.memory_state = "retention";
}

function fcNormalizeMemoryType(value) {
  const normalized = String(value || "").toLowerCase().trim();
  return FC_MEMORY_TYPES.includes(normalized) ? normalized : "fact";
}

function fcAssignGroup(card, requestedGroup) {
  const labelRaw = (requestedGroup || card.memory_group || "").trim();
  const label = labelRaw || fcInferGroupLabel(card);
  card.memory_group = label;
  card.memory_group_id = fcSlug(label) || "general";
}

function fcDetectDuplicates(data, name, card) {
  card.duplicate_of = "";
  card.near_duplicates = [];
  const fp = card.normalized_fingerprint;
  const thisTokens = fcTokenSet((card.prompt || "") + "\n" + (card.answer || ""));
  for (const [otherName, otherCard] of Object.entries(data.cards || {})) {
    if (otherName === name || !otherCard) continue;
    const otherFp = otherCard.normalized_fingerprint || fcCardFingerprint(otherCard);
    if (fp && otherFp && fp === otherFp) {
      card.duplicate_of = otherName;
      card.near_duplicates = [otherName];
      return;
    }
    const sim = fcJaccardSimilarity(thisTokens, fcTokenSet((otherCard.prompt || "") + "\n" + (otherCard.answer || "")));
    if (sim >= FC_NEAR_DUPLICATE_JACCARD) {
      card.near_duplicates.push(otherName);
      if (!card.duplicate_of) card.duplicate_of = otherName;
    }
  }
  card.near_duplicates = card.near_duplicates.slice(0, 8);
}

function fcRebuildIndexes(data) {
  fcEnsureMeta(data);
  const groupCounts = {};
  const fingerprintIndex = {};
  for (const [name, card] of Object.entries(data.cards || {})) {
    fcNormalizeCard(card);
    fcAssignGroup(card);
    fcUpdateDerivedCardState(card);
    groupCounts[card.memory_group_id] = {
      id: card.memory_group_id,
      label: card.memory_group,
      count: (groupCounts[card.memory_group_id] ? groupCounts[card.memory_group_id].count : 0) + 1
    };
    const fp = card.normalized_fingerprint;
    if (!fingerprintIndex[fp]) fingerprintIndex[fp] = [];
    fingerprintIndex[fp].push(name);
  }
  data.meta.memory_groups = groupCounts;
  data.meta.fingerprint_index = fingerprintIndex;
}

function fcMigrateSchema(data) {
  fcEnsureMeta(data);
  const from = Number(data.meta.schema_version) || 1;
  if (from < 2) {
    Object.values(data.cards || {}).forEach((card) => {
      if (!Array.isArray(card.lapse_history)) card.lapse_history = [];
    });
  }
  if (from < 3) {
    Object.values(data.cards || {}).forEach((card) => {
      if (!Number.isFinite(card.confidence)) card.confidence = 0;
      if (!Number.isFinite(card.long_term_confidence)) card.long_term_confidence = 0;
      if (!Number.isFinite(card.consolidation_score)) card.consolidation_score = 0;
    });
  }
  if (from < FC_SCHEMA_VERSION) {
    Object.values(data.cards || {}).forEach((card) => {
      fcNormalizeCard(card);
      fcAssignGroup(card);
      fcUpdateDerivedCardState(card);
    });
  }
  data.meta.schema_version = FC_SCHEMA_VERSION;
  data.meta.last_migrated_at = new Date().toISOString();
  fcRebuildIndexes(data);
  return from !== FC_SCHEMA_VERSION;
}

function fcLoadData() {
  function buildFreshData() {
    const fresh = { cards: JSON.parse(JSON.stringify(fcDefaultCards)), meta: {} };
    fcEnsureMeta(fresh);
    Object.entries(fresh.cards).forEach(([name, card]) => {
      if (!card || typeof card !== "object") {
        delete fresh.cards[name];
        return;
      }
      fcNormalizeCard(card);
      fcAssignGroup(card, "default");
      fcUpdateDerivedCardState(card);
    });
    fcMigrateSchema(fresh);
    return fresh;
  }

  try {
    const raw = localStorage.getItem(FC_STORAGE_KEY);
    if (!raw) {
      return buildFreshData();
    }
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== "object" || !parsed.cards) {
      return buildFreshData();
    }
    fcEnsureMeta(parsed);
    Object.entries(parsed.cards).forEach(([name, card]) => {
      if (!card || typeof card !== "object") {
        delete parsed.cards[name];
        return;
      }
      try {
        fcNormalizeCard(card);
      } catch (e) {
        delete parsed.cards[name];
      }
    });
    const migrated = fcMigrateSchema(parsed);
    if (migrated) {
      try {
        localStorage.setItem(FC_STORAGE_KEY, JSON.stringify(parsed));
      } catch (e) {
        fcUpdateSessionUi("Migration succeeded but could not be persisted due to storage limits.");
      }
    }
    return parsed;
  } catch (e) {
    return buildFreshData();
  }
}

function fcSaveData(d) {
  try {
    fcMigrateSchema(d);
    fcCreateSnapshot();
    localStorage.setItem(FC_STORAGE_KEY, JSON.stringify(d));
    return true;
  } catch (e) {
    fcUpdateSessionUi("Save failed: browser storage quota exceeded.");
    return false;
  }
}

function fcLoadSettings() {
  try {
    const raw = localStorage.getItem(FC_SETTINGS_KEY);
    if (!raw) return { ...FC_DEFAULTS };
    const parsed = JSON.parse(raw);
    return fcNormalizeSettings(parsed);
  } catch (e) {
    return { ...FC_DEFAULTS };
  }
}

function fcParseWeightsString(value) {
  if (Array.isArray(value) && value.length === 17 && value.every((n) => Number.isFinite(Number(n)))) {
    return value.map((n) => Number(n));
  }
  if (typeof value !== "string") return null;
  const pieces = value.split(/[,\s]+/).map((x) => x.trim()).filter(Boolean);
  if (pieces.length !== 17) return null;
  const nums = pieces.map(Number);
  if (!nums.every((n) => Number.isFinite(n))) return null;
  return nums;
}

function fcValidWeightsArray(value) {
  return Array.isArray(value) && value.length === 17 && value.every((n) => Number.isFinite(Number(n)));
}

function fcOverdueDaysFromLastExport() {
  if (!fcSettings.backup_last_export_at) return Number.POSITIVE_INFINITY;
  const elapsed = fcDaysBetweenIso(fcSettings.backup_last_export_at, new Date().toISOString());
  if (!Number.isFinite(elapsed)) return Number.POSITIVE_INFINITY;
  return elapsed;
}

function fcCloseHardReminder() {
  const modal = document.getElementById("fcHardReminderModal");
  if (modal) modal.classList.remove("active");
  fcHardReminderCheckedOnce = true;
}

function fcShowHardReminderIfNeeded() {
  const modal = document.getElementById("fcHardReminderModal");
  const text = document.getElementById("fcHardReminderText");
  if (!modal || !text) return;
  if (!fcSettings.hard_reminder_enabled) {
    modal.classList.remove("active");
    return;
  }
  const overdueDays = fcOverdueDaysFromLastExport();
  if (overdueDays < fcSettings.hard_reminder_days) {
    modal.classList.remove("active");
    return;
  }
  if (!Number.isFinite(overdueDays)) {
    text.textContent = "You have not exported a backup yet. Please export now to avoid data loss.";
  } else {
    text.textContent = "Your last backup export was " + overdueDays + " day(s) ago. Please export now.";
  }
  modal.classList.add("active");
}

function fcExportBackupFromModal() {
  fcExportBackup();

}

function fcSnoozeHardReminder() {
  fcSnoozeBackupReminder();
  fcHardReminderCheckedOnce = true;
  fcCloseHardReminder();
}

function fcCreateSnapshot() {
  try {
    const currentRaw = localStorage.getItem(FC_STORAGE_KEY);
    if (!currentRaw) return;
    let snapshots = [];
    const existing = localStorage.getItem(FC_SNAPSHOT_KEY);
    if (existing) {
      const parsed = JSON.parse(existing);
      if (Array.isArray(parsed)) snapshots = parsed;
    }
    snapshots.push({
      id: Date.now(),
      timestamp: new Date().toISOString(),
      data: currentRaw
    });
    if (snapshots.length > fcSettings.max_snapshots) {
      snapshots = snapshots.slice(snapshots.length - fcSettings.max_snapshots);
    }
    localStorage.setItem(FC_SNAPSHOT_KEY, JSON.stringify(snapshots));
  } catch (e) {}
}

function fcPruneSnapshots() {
  try {
    const existing = localStorage.getItem(FC_SNAPSHOT_KEY);
    if (!existing) return;
    const parsed = JSON.parse(existing);
    if (!Array.isArray(parsed)) return;
    const pruned = parsed.slice(Math.max(0, parsed.length - fcSettings.max_snapshots));
    localStorage.setItem(FC_SNAPSHOT_KEY, JSON.stringify(pruned));
  } catch (e) {}
}

function fcSafeParseData(raw) {
  const parsed = JSON.parse(raw);
  if (!parsed || typeof parsed !== "object" || !parsed.cards || typeof parsed.cards !== "object") {
    throw new Error("Invalid backup format");
  }
  const normalized = {
    cards: parsed.cards,
    meta: parsed.meta && typeof parsed.meta === "object" ? parsed.meta : {}
  };
  fcEnsureMeta(normalized);
  Object.values(normalized.cards).forEach(fcNormalizeCard);
  fcMigrateSchema(normalized);
  return normalized;
}

function fcDownloadText(filename, text) {
  const blob = new Blob([text], { type: "application/json;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function fcExportBackup() {
  const data = fcLoadData();
  const payload = {
    version: FC_SCHEMA_VERSION,
    exported_at: new Date().toISOString(),
    app: "memory_engine",
    data: data,
    settings: fcSettings
  };
  const stamp = fcTodayKey().replace(/-/g, "");
  fcDownloadText("memory_engine_backup_" + stamp + ".json", JSON.stringify(payload, null, 2));
  fcSettings.backup_last_export_at = new Date().toISOString();
  fcSettings.backup_snooze_until = "";
  try {
    localStorage.setItem(FC_SETTINGS_KEY, JSON.stringify(fcSettings));
  } catch (e) {
    fcUpdateSessionUi("Backup exported, but reminder state could not be saved.");
    return;
  }
  fcUpdateBackupReminderUi();
  fcUpdateSessionUi("Backup exported");
}

function fcPickImportBackup() {
  const input = document.getElementById("fcImportFile");
  if (!input) return;
  input.value = "";
  input.click();
}

function fcImportBackup(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function onLoad() {
    try {
      const rawText = String(reader.result || "");
      const parsedTop = JSON.parse(rawText);
      const rawData = parsedTop && parsedTop.data ? JSON.stringify(parsedTop.data) : rawText;
      const imported = fcSafeParseData(rawData);
      const importedSettings = parsedTop && parsedTop.settings ? fcNormalizeSettings(parsedTop.settings) : null;
      const proceed = window.confirm("Import backup and replace current data? A snapshot of current state will be kept.");
      if (!proceed) return;
      if (!fcSaveData(imported)) return;
      if (importedSettings) {
        fcSettings = importedSettings;
        try {
          localStorage.setItem(FC_SETTINGS_KEY, JSON.stringify(importedSettings));
        } catch (e) {
          fcUpdateSessionUi("Imported data saved, but settings could not be saved.");
        }
        fcApplySettingsToForm();
      }
      fcStopDueSession("Backup imported");
      fcRender();
    } catch (err) {
      fcUpdateSessionUi("Import failed: invalid backup file");
    }
  };
  reader.onerror = function onError() {
    fcUpdateSessionUi("Import failed: could not read file");
  };
  reader.readAsText(file, "utf-8");
}

function fcDaysBetweenIso(fromIso, toIso) {
  const fromMs = new Date(fromIso).getTime();
  const toMs = new Date(toIso).getTime();
  if (!Number.isFinite(fromMs) || !Number.isFinite(toMs)) return Number.POSITIVE_INFINITY;
  return Math.floor((toMs - fromMs) / (1000 * 60 * 60 * 24));
}

function fcBackupReminderMessage() {
  const days = Number(fcSettings.backup_reminder_days) || 0;
  if (days <= 0) return "";
  const nowIso = new Date().toISOString();
  const snoozeMs = new Date(fcSettings.backup_snooze_until || "").getTime();
  if (Number.isFinite(snoozeMs) && snoozeMs > Date.now()) return "";
  if (!fcSettings.backup_last_export_at) return "Backup reminder: you have never exported a backup.";
  const elapsed = fcDaysBetweenIso(fcSettings.backup_last_export_at, nowIso);
  if (!Number.isFinite(elapsed)) return "Backup reminder: export a backup soon.";
  if (elapsed >= days) return "Backup reminder: last export was " + elapsed + " day(s) ago.";
  return "";
}

function fcUpdateBackupReminderUi() {
  const message = fcBackupReminderMessage();
  const status = document.getElementById("fcSessionStatus");
  const snoozeBtn = document.getElementById("fcSnoozeReminderBtn");
  if (!status || !snoozeBtn) return;
  if (!fcSessionActive && message) {
    status.textContent = message;
    snoozeBtn.style.display = "";
  } else {
    if (!fcSessionActive && status.textContent && status.textContent.startsWith("Backup reminder:")) {
      status.textContent = "";
    }
    snoozeBtn.style.display = "none";
  }
  if (!fcHardReminderCheckedOnce) {
    fcShowHardReminderIfNeeded();
    fcHardReminderCheckedOnce = true;
  }
}

function fcSnoozeBackupReminder() {
  fcSettings.backup_snooze_until = new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString();
  try {
    localStorage.setItem(FC_SETTINGS_KEY, JSON.stringify(fcSettings));

function fcRenderSnapshots() {
  const list = document.getElementById("fcSnapshotsList");
  try {
    const raw = localStorage.getItem(FC_SNAPSHOT_KEY);
    const snapshots = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(snapshots) || snapshots.length === 0) {
      list.innerHTML = '<div class="fc-empty">No snapshots yet.</div>';
      return;
    }
    const rows = snapshots.slice().reverse().map((snap, idx) => {
      const at = snap && snap.timestamp ? new Date(snap.timestamp).toLocaleString() : "Unknown time";
      const id = snap && snap.id ? snap.id : idx;
      const safeId = fcEscapeJsSingleQuoted(String(id));
      return '<div class="fc-row" style="cursor:default;">' +
        '<div class="fc-info"><div class="fc-name">Snapshot ' + fcEscapeHtml(id) + '</div><div class="fc-meta">' + fcEscapeHtml(at) + "</div></div>" +
        '<div><button class="fc-btn-secondary" style="margin-top:0;margin-right:0;" onclick="fcRestoreSnapshot(\'' + safeId + '\')">Restore</button></div>' +
      "</div>";
    });
    list.innerHTML = rows.join("");
  } catch (e) {
    list.innerHTML = '<div class="fc-empty">Could not read snapshots.</div>';
  }

function fcRestoreSnapshot(snapshotId) {
  try {
    const raw = localStorage.getItem(FC_SNAPSHOT_KEY);
    const snapshots = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(snapshots)) return;
    const match = snapshots.find((s) => s && String(s.id) === String(snapshotId));
    if (!match) return;
    const restored = fcSafeParseData(match.data);
    const proceed = window.confirm("Restore this snapshot and replace current data? Current state will be snapshotted.");
    if (!proceed) return;
    if (!fcSaveData(restored)) return;
    fcStopDueSession("Snapshot restored");
    fcRender();
  } catch (e) {
    fcUpdateSessionUi("Restore failed");
  }
}

function fcTodayKey() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, "0");
  const d = String(now.getDate()).padStart(2, "0");
  return y + "-" + m + "-" + d;
}

function fcEnsureMeta(data) {
  if (!data.meta || typeof data.meta !== "object") data.meta = {};
  if (!Number.isFinite(Number(data.meta.schema_version))) data.meta.schema_version = 1;
  const today = fcTodayKey();
  if (data.meta.day_key !== today) {
    data.meta.day_key = today;
    data.meta.reviews_done = 0;
    data.meta.new_done = 0;
  }
  if (!Number.isFinite(data.meta.reviews_done)) data.meta.reviews_done = 0;
  if (!Number.isFinite(data.meta.new_done)) data.meta.new_done = 0;
  if (!Array.isArray(data.meta.review_logs)) data.meta.review_logs = [];
  if (!Array.isArray(data.meta.calibration_history)) data.meta.calibration_history = [];
  if (!data.meta.memory_groups || typeof data.meta.memory_groups !== "object") data.meta.memory_groups = {};
  if (!data.meta.fingerprint_index || typeof data.meta.fingerprint_index !== "object") data.meta.fingerprint_index = {};
  if (!data.meta.behavior || typeof data.meta.behavior !== "object") data.meta.behavior = {};
  if (!Number.isFinite(data.meta.behavior.manual_grade_changes)) data.meta.behavior.manual_grade_changes = 0;
  if (!Number.isFinite(data.meta.behavior.postpones)) data.meta.behavior.postpones = 0;
  if (!Number.isFinite(data.meta.behavior.sessions_started)) data.meta.behavior.sessions_started = 0;
  if (!Number.isFinite(data.meta.behavior.sessions_completed)) data.meta.behavior.sessions_completed = 0;
  if (!Number.isFinite(data.meta.behavior.last_session_started_at_ms)) data.meta.behavior.last_session_started_at_ms = 0;
  if (typeof data.meta.last_migrated_at !== "string") data.meta.last_migrated_at = "";
}

function fcNormalizeCard(card) {
  // Migrate stability from seconds to days: old-format values stored as days*86400 will exceed 3650.
  if (Number.isFinite(card.stability) && card.stability > 3650) {
    card.stability = card.stability / FC_DAY_SECONDS;
  }
  if (!Number.isFinite(card.interval_days)) card.interval_days = Math.max(card.stability || 0.01, 0.01);
  if (!Number.isFinite(card.stability)) card.stability = Math.max(card.interval_days, 0.01);
  if (!Number.isFinite(card.difficulty)) card.difficulty = 5;
  if (!Number.isFinite(card.retrievability)) card.retrievability = 1;
  if (!Number.isFinite(card.reps)) card.reps = 0;
  if (!Number.isFinite(card.lapses)) card.lapses = 0;
  if (!Array.isArray(card.lapse_history)) card.lapse_history = [];
  if (typeof card.last_lapse_at !== "string") card.last_lapse_at = "";
  if (!Number.isFinite(card.confidence)) card.confidence = 0;
  if (!Number.isFinite(card.long_term_confidence)) card.long_term_confidence = 0;
  if (!Number.isFinite(card.consolidation_score)) card.consolidation_score = 0;
  if (!Number.isFinite(card.retention_horizon_days)) card.retention_horizon_days = card.interval_days || 0.01;
  if (typeof card.memory_state !== "string") card.memory_state = "learning";
  if (typeof card.memory_group !== "string") card.memory_group = "general";
  if (typeof card.memory_group_id !== "string") card.memory_group_id = "general";
  if (typeof card.duplicate_of !== "string") card.duplicate_of = "";
  if (!Array.isArray(card.near_duplicates)) card.near_duplicates = [];
  if (!Array.isArray(card.tags)) card.tags = [];
  card.tags = fcNormalizeTagList(card.tags);
  card.memory_type = fcNormalizeMemoryType(card.memory_type);
  card.normalized_fingerprint = fcCardFingerprint(card);
  card.memory_group_id = fcSlug(card.memory_group_id || card.memory_group) || "general";
  if (!card.memory_group || !card.memory_group.trim()) card.memory_group = card.memory_group_id;
  if (!["learning", "retention", "stable", "reactivation"].includes(card.memory_state)) card.memory_state = "learning";
  card.lapse_history = card.lapse_history.filter((x) => typeof x === "string").slice(-64);
  if (typeof card.leech_suspended_until !== "string") card.leech_suspended_until = "";
  if (typeof card.leech_watch_until !== "string") card.leech_watch_until = "";
  if (!Number.isFinite(card.struggle_score)) card.struggle_score = 0;
  if (!Number.isFinite(card.hard_score)) card.hard_score = 0;
  if (!Number.isFinite(card.struggle_reviews)) card.struggle_reviews = 0;
  card.difficulty = Math.max(1, Math.min(10, card.difficulty));
  card.retrievability = Math.max(0, Math.min(1, card.retrievability));
  card.struggle_score = Math.max(0, Math.min(1, card.struggle_score));
  card.hard_score = Math.max(0, Math.min(1, card.hard_score));
  card.confidence = Math.max(0, Math.min(1, card.confidence));
  card.long_term_confidence = Math.max(0, Math.min(1, card.long_term_confidence));
  card.consolidation_score = Math.max(0, Math.min(1, card.consolidation_score));
  const maxHorizonDays = Number(fcSettings.max_horizon_days) || FC_DEFAULTS.max_horizon_days;
  const currentHorizon = Number(card.retention_horizon_days) || 0.01;
  card.retention_horizon_days = Math.max(0.01, Math.min(maxHorizonDays, currentHorizon));
}

function fcRetention(tSeconds, stability) {
  // FSRS forgetting curve: R(t, S) = (1 + t / (9S))^-1  stability is in days.
  if (stability <= 0) return 0;
  const tDays = Math.max(0, tSeconds / FC_DAY_SECONDS);
  const sDays = Math.max(0.01, stability);
  return Math.pow(1 + (tDays / (9 * sDays)), -1);
}

function fcNorm(text) {
  return text.toUpperCase().replace(/[^A-Z0-9\s]/g, " ").replace(/\s+/g, " ").trim();
}

function fcEscapeHtml(value) {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function fcEscapeJsSingleQuoted(value) {
  return String(value)
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")
    .replace(/\r/g, "\\r")
    .replace(/\n/g, "\\n");
}

function fcScore(user, answer) {
  const u = fcNorm(user);
  if (!u) return 0;
  const uLines = user.split("\n").map(fcNorm).filter(Boolean);
  const aLines = answer.split("\n").map(fcNorm).filter(Boolean);
  const lineMatch = uLines.filter((line, i) => line === aLines[i]).length;
  const lineScore = lineMatch / Math.max(aLines.length, 1);
  const uWords = new Set(u.split(" "));
  const aWords = fcNorm(answer).split(" ");
  const overlap = aWords.filter((w) => uWords.has(w)).length;
  const tokenScore = overlap / Math.max(aWords.length, 1);
  return Math.round(100 * (0.6 * lineScore + 0.4 * tokenScore));
}

function fcRecommendRating(score) {
  if (score < 50) return 0;
  if (score < 70) return 1;
  if (score < 90) return 2;
  return 3;
}

function fcRatingLabel(rating) {
  return ["Again", "Hard", "Good", "Easy"][rating] || "Good";
}

function fcFsrsInitialStability(rating, w) {
  const idx = Math.max(0, Math.min(3, rating));
  return Math.max(0.01, Number(w[idx]));
}

function fcFsrsInitialDifficulty(grade, w) {
  // FSRS: D0 = w4 - exp(w5 * (G - 1)) + 1
  return Math.max(1, Math.min(10, Number(w[4]) - Math.exp(Number(w[5]) * (grade - 1)) + 1));
}

function fcFsrsNextDifficulty(difficulty, grade, w) {
  // FSRS mean reversion: D' = w7*D0(3) + (1-w7)*(D - w6*(G-3))
  const d0Good = fcFsrsInitialDifficulty(3, w);
  const linearDamp = difficulty - Number(w[6]) * (grade - 3);
  const next = Number(w[7]) * d0Good + (1 - Number(w[7])) * linearDamp;
  return Math.max(1, Math.min(10, next));
}

function fcFsrsNextRecallStability(stabilityDays, difficulty, retrievability, grade, w) {
  // FSRS successful-recall update
  const hardPenalty = grade === 2 ? Number(w[15]) : 1;
  const easyBonus = grade === 4 ? Number(w[16]) : 1;
  const growth =
    Math.exp(Number(w[8])) *
    (11 - difficulty) *
    Math.pow(Math.max(0.01, stabilityDays), -Number(w[9])) *
    (Math.exp((1 - retrievability) * Number(w[10])) - 1) *
    hardPenalty *
    easyBonus;
  return Math.max(0.02, stabilityDays * (1 + growth));
}

function fcFsrsNextForgetStability(stabilityDays, difficulty, retrievability, w) {
  // FSRS lapse update
  const next = Number(w[11]) * Math.pow(Math.max(0.01, difficulty), -Number(w[12])) *
    (Math.pow(Math.max(1.0001, stabilityDays + 1), Number(w[13])) - 1) *
    Math.exp((1 - retrievability) * Number(w[14]));
  return Math.max(0.02, next);
}

function fcFsrsInterval(stabilityDays, targetRetention) {
  // Invert FSRS forgetting curve to solve for interval at desired retention:
  // I = 9S * (1/R - 1)
  const r = Math.max(0.85, Math.min(0.9, targetRetention));
  return Math.max(0.01, 9 * stabilityDays * ((1 / r) - 1));
}

function fcUpdateCard(card, rating) {
  fcNormalizeCard(card);
  const w = Array.isArray(fcSettings.fsrs_w) && fcSettings.fsrs_w.length === 17 ? fcSettings.fsrs_w : FC_FSRS_DEFAULT_W;
  const grade = Math.max(1, Math.min(4, rating + 1)); // Again/Hard/Good/Easy => 1..4
  const prevIntervalDays = Math.max(0.01, Number(card.interval_days));
  const prevStabilityDays = Math.max(0.01, Number(card.stability)); // stability stored in days
  let stabilityDays = prevStabilityDays;
  let difficulty = Math.max(1, Math.min(10, Number(card.difficulty)));
  let reps = parseInt(card.reps, 10);
  let lapses = parseInt(card.lapses, 10);
  const lastReviewMs = new Date(card.last_review).getTime();
  const elapsedDays = Math.max(0, (Date.now() - lastReviewMs) / (1000 * FC_DAY_SECONDS));
  const retrievability = Math.pow(1 + (elapsedDays / (9 * Math.max(0.01, stabilityDays))), -1);
  const targetRetention = Math.max(0.85, Math.min(0.9, Number(fcSettings.target_retention) || 0.9));
  const wasNew = reps <= 0;
  const overdueDaysBeforeUpdate = fcGetOverdueDays(card);
  difficulty = fcFsrsNextDifficulty(difficulty, grade, w);
  if (wasNew) {
    if (grade === 1) {
      stabilityDays = Math.max(0.02, fcFsrsInitialStability(0, w) * 0.6);
      difficulty = fcFsrsInitialDifficulty(1, w);
      lapses += 1;
      reps = 0;
    } else {
      stabilityDays = fcFsrsInitialStability(grade - 1, w);
      difficulty = fcFsrsInitialDifficulty(grade, w);
      reps = 1;
    }
  } else if (grade === 1) {
    stabilityDays = fcFsrsNextForgetStability(stabilityDays, difficulty, retrievability, w);
    lapses += 1;
    reps = 0;
  } else {
    stabilityDays = fcFsrsNextRecallStability(stabilityDays, difficulty, retrievability, grade, w);
    reps += 1;
  }

  let intervalDays;
  if (grade === 1) intervalDays = 30 / (24 * 60);
  else if (grade === 2 && wasNew) intervalDays = 0.5;
  else intervalDays = fcFsrsInterval(stabilityDays, targetRetention);

  const maxHorizon = Number(fcSettings.max_horizon_days) || FC_DEFAULTS.max_horizon_days;
  if (card.memory_state === "stable" && grade >= 3) {
    // Preserve growth of already-stable memories so they are not over-drilled.
    intervalDays = Math.max(intervalDays, prevIntervalDays * FC_STABLE_MIN_GROWTH);
  }
  if (grade === 1 && overdueDaysBeforeUpdate >= (Number(fcSettings.reactivation_overdue_days) || FC_DEFAULTS.reactivation_overdue_days)) {
    intervalDays = Math.max(intervalDays, 0.25);
    card.memory_state = "reactivation";
    card.last_reactivated_at = new Date().toISOString();
  }
  intervalDays = Math.min(intervalDays, maxHorizon);
  stabilityDays = Math.min(stabilityDays, maxHorizon);
  card.interval_days = Math.round(intervalDays * 1000) / 1000;
  card.stability = Math.round(stabilityDays * 1000) / 1000; // stored in days
  card.difficulty = Math.round(difficulty * 1000) / 1000;
  card.retrievability = Math.round(Math.max(0, Math.min(1, retrievability)) * 10000) / 10000;
  card.reps = reps;
  card.lapses = lapses;
  if (grade === 1) {
    card.last_lapse_at = new Date().toISOString();
    card.lapse_history.push(card.last_lapse_at);
    if (card.lapse_history.length > 64) card.lapse_history = card.lapse_history.slice(card.lapse_history.length - 64);
  }
  card.last_review = new Date().toISOString();
  card.next_due = new Date(Date.now() + intervalDays * FC_DAY_SECONDS * 1000).toISOString();
  fcUpdateDerivedCardState(card);
  return {
    prev_interval_days: prevIntervalDays,
    prev_stability_days: prevStabilityDays,
    retrievability
  };
}

function fcGetRetention(card) {
  const lastReview = new Date(card.last_review).getTime();
  const tSeconds = (Date.now() - lastReview) / 1000;
  const r = fcRetention(tSeconds, card.stability);
  card.retrievability = Math.round(Math.max(0, Math.min(1, r)) * 10000) / 10000;
  fcUpdateDerivedCardState(card);
  return r;
}

function fcIsDue(card) {
  return new Date(card.next_due) <= new Date();
}

function fcFormatDue(card) {
  const due = new Date(card.next_due);
  const now = new Date();
  const diff = due - now;
  if (diff <= 0) return "due now";
  const mins = Math.floor(diff / 60000);
  const hrs = Math.floor(mins / 60);
  const days = Math.floor(hrs / 24);
  if (days > 0) return "in " + days + "d";
  if (hrs > 0) return "in " + hrs + "h";
  return "in " + mins + "m";
}

function fcFormatDueFromCard(card) {
  const due = new Date(card.next_due);
  const now = new Date();
  const diff = due - now;
  if (diff <= 0) return "now";
  const mins = Math.floor(diff / 60000);
  const hrs = Math.floor(mins / 60);
  const days = Math.floor(hrs / 24);
  if (days > 0) return "in " + days + " day" + (days > 1 ? "s" : "");
  if (hrs > 0) return "in " + hrs + "h";
  return "in " + mins + "m";
}

function fcRenderStats(data) {
  fcEnsureMeta(data);
  const cards = Object.values(data.cards);
